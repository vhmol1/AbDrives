{ code:'FLT S02', device:'k5500', cat:'FLT-S',
  name:{ en:'Motor Commutation Fault', pt:'Falha de Comutação do Motor' },
  desc:{ en:'An illegal state transition of the motor hall-commutation feedback signals has been detected.', pt:'Uma transição de estado ilegal dos sinais de feedback de comutação hall do motor foi detectada.' },
  action:{ en:'Verify motor hall feedback wiring is not open/shorted/missing. Use shielded cables away from noise. Check system grounds, replace the motor.', pt:'Verificar fiação do feedback hall do motor. Usar cabos blindados. Verificar aterramento, substituir o motor.' }},

{ code:'FLT S03', device:'k5500', cat:'FLT-S',
  name:{ en:'Motor Overspeed Factory Limit Fault', pt:'Falha de Sobrevelocidade (Limite de Fábrica)' },
  desc:{ en:'Motor speed has exceeded 125% of its maximum speed, or output frequency exceeded 590 Hz.', pt:'A velocidade do motor excedeu 125% da velocidade máxima, ou a frequência de saída excedeu 590 Hz.' },
  action:{ en:'Check control loop tuning. Reduce the velocity command.', pt:'Verificar a sintonia do loop de controle. Reduzir o comando de velocidade.' }},

{ code:'FLT S04', device:'k5500', cat:'FLT-S',
  name:{ en:'Motor Overspeed User Limit Fault', pt:'Falha de Sobrevelocidade (Limite do Usuário)' },
  desc:{ en:'Motor speed has exceeded the motor overspeed user limit.', pt:'A velocidade do motor excedeu o limite de sobrevelocidade definido pelo usuário.' },
  action:{ en:'Check control loop tuning. Increase the Motor Overspeed UL attribute value.', pt:'Verificar sintonia do loop de controle. Aumentar o valor do atributo Motor Overspeed UL.' }},

{ code:'FLT S05', device:'k5500', cat:'FLT-S',
  name:{ en:'Motor Overtemperature Factory Limit Fault', pt:'Falha de Sobretemperatura do Motor (Limite de Fábrica)' },
  desc:{ en:'Motor thermistor calculations indicate factory temperature limit has been exceeded. Sub-codes: 01=Motor Thermostat/Thermistor, 02=Encoder Temperature Sensor.', pt:'Cálculos do termistor do motor indicam que o limite de temperatura de fábrica foi excedido. Sub-códigos: 01=Termostato/Termistor, 02=Sensor de Temperatura do Encoder.' },
  action:{ en:'Operate motor within continuous torque rating. Reduce motor ambient temperature. Add motor cooling.', pt:'Operar o motor dentro da classificação de torque contínuo. Reduzir temperatura ambiente. Adicionar resfriamento.' }},

{ code:'FLT S07', device:'k5500', cat:'FLT-S',
  name:{ en:'Motor Thermal Overload Factory Limit Fault', pt:'Falha de Sobrecarga Térmica do Motor (Limite de Fábrica)' },
  desc:{ en:'The motor thermal model has exceeded its factory set thermal capacity limit.', pt:'O modelo térmico do motor excedeu o limite de capacidade térmica de fábrica.' },
  action:{ en:'Modify the command profile to reduce speed or increase time.', pt:'Modificar o perfil de comando para reduzir a velocidade ou aumentar o tempo.' }},

{ code:'FLT S08', device:'k5500', cat:'FLT-S',
  name:{ en:'Motor Thermal Overload User Limit Fault', pt:'Falha de Sobrecarga Térmica do Motor (Limite do Usuário)' },
  desc:{ en:'The motor thermal model has exceeded the thermal capacity limit given by Motor Thermal Overload User Limit.', pt:'O modelo térmico do motor excedeu o limite de capacidade térmica definido pelo usuário.' },
  action:{ en:'Modify the command profile. Increase the Motor Thermal Overload UL attribute value.', pt:'Modificar o perfil de comando. Aumentar o valor do atributo Motor Thermal Overload UL.' }},

{ code:'FLT S09', device:'k5500', cat:'FLT-S',
  name:{ en:'Motor Phase Loss', pt:'Perda de Fase do Motor' },
  desc:{ en:'Torque Prove function detected motor current below a limit set by Torque Prove Current Limit.', pt:'A função Torque Prove detectou corrente do motor abaixo do limite.' },
  action:{ en:'Check motor connections.', pt:'Verificar as conexões do motor.' }},

{ code:'FLT S10', device:'k5500', cat:'FLT-S',
  name:{ en:'Inverter Overcurrent Fault', pt:'Falha de Sobrecorrente do Inversor' },
  desc:{ en:'Inverter current has exceeded the instantaneous current limit (determined by hardware).', pt:'A corrente do inversor excedeu o limite instantâneo determinado por hardware.' },
  action:{ en:'Check motor power cable for shorts. Verify motor windings are not shorted. Verify motor power wire gauge. Operate within continuous power rating. Reduce acceleration times.', pt:'Verificar curto no cabo de potência. Verificar enrolamentos do motor. Verificar bitola do cabo. Operar dentro da capacidade contínua. Reduzir tempos de aceleração.' }},

{ code:'FLT S11', device:'k5500', cat:'FLT-S',
  name:{ en:'Inverter Overtemperature Factory Limit Fault', pt:'Falha de Sobretemperatura do Inversor (Limite de Fábrica)' },
  desc:{ en:'The measured inverter temperature has exceeded the factory set temperature limit.', pt:'A temperatura medida do inversor excedeu o limite de temperatura de fábrica.' },
  action:{ en:'Modify command profile to reduce speed or increase time. Reduce drive ambient temperature. Verify airflow through drive is not obstructed.', pt:'Modificar perfil de comando. Reduzir temperatura ambiente. Verificar que o fluxo de ar não está obstruído.' }},

{ code:'FLT S13', device:'k5500', cat:'FLT-S',
  name:{ en:'Inverter Thermal Overload Factory Limit Fault', pt:'Falha de Sobrecarga Térmica do Inversor (Limite de Fábrica)' },
  desc:{ en:'The thermal capacity of the inverter has exceeded the factory set limit.', pt:'A capacidade térmica do inversor excedeu o limite de fábrica.' },
  action:{ en:'Modify the command profile to reduce speed or increase time.', pt:'Modificar o perfil de comando para reduzir a velocidade ou aumentar o tempo.' }},

{ code:'FLT S14', device:'k5500', cat:'FLT-S',
  name:{ en:'Inverter Thermal Overload User Limit Fault', pt:'Falha de Sobrecarga Térmica do Inversor (Limite do Usuário)' },
  desc:{ en:'The thermal capacity of the inverter has exceeded the user set limit given by the Inverter Thermal Overload User Limit.', pt:'A capacidade térmica do inversor excedeu o limite definido pelo usuário.' },
  action:{ en:'Modify command profile. Increase the Inverter Thermal Overload UL attribute value.', pt:'Modificar o perfil de comando. Aumentar o atributo Inverter Thermal Overload UL.' }},

{ code:'FLT S15', device:'k5500', cat:'FLT-S',
  name:{ en:'Converter Overcurrent Fault', pt:'Falha de Sobrecorrente do Conversor' },
  desc:{ en:'The measured converter current has exceeded the factory set current limit.', pt:'A corrente medida do conversor excedeu o limite de corrente de fábrica.' },
  action:{ en:'Reduce acceleration times of all drives sharing the DC bus. Reduce number of shared DC follower drives. Reduce number of capacitor modules.', pt:'Reduzir tempos de aceleração de todos os drives no barramento CC. Reduzir drives seguidores. Reduzir número de módulos capacitores.' }},

{ code:'FLT S16', device:'k5500', cat:'FLT-S',
  name:{ en:'Ground Current Factory Limit Fault', pt:'Falha de Corrente de Terra (Limite de Fábrica)' },
  desc:{ en:'The sensing circuitry in the power stage has detected excessive ground current.', pt:'O circuito de detecção no estágio de potência detectou corrente de terra excessiva.' },
  action:{ en:'Check motor power wiring and cable for shorts. Replace motor if fault persists. Check DC-bus wiring if using capacitor module.', pt:'Verificar fiação e cabo do motor para curtos. Substituir motor se persistir. Verificar fiação do barramento CC se usar módulo capacitor.' }},

{ code:'FLT S18', device:'k5500', cat:'FLT-S',
  name:{ en:'Converter OverTemp Factory Limit Fault', pt:'Falha de Sobretemperatura do Conversor (Limite de Fábrica)' },
  desc:{ en:'The measured converter temperature has exceeded the factory set temperature limit.', pt:'A temperatura medida do conversor excedeu o limite de temperatura de fábrica.' },
  action:{ en:'Reduce number of shared DC follower drives. Modify command profile. Reduce drive ambient temperature. Verify airflow through drive is not obstructed.', pt:'Reduzir drives seguidores. Modificar perfil de comando. Reduzir temperatura ambiente. Verificar fluxo de ar.' }},

{ code:'FLT S20', device:'k5500', cat:'FLT-S',
  name:{ en:'Converter Thermal Overload Factory Limit Fault', pt:'Falha de Sobrecarga Térmica do Conversor (Limite de Fábrica)' },
  desc:{ en:'The converter thermal model indicates the temperature has exceeded the factory set capacity limit of 110%.', pt:'O modelo térmico do conversor indica que a temperatura excedeu o limite de capacidade de fábrica de 110%.' },
  action:{ en:'Reduce number of shared DC follower drives. Reduce duty-cycle of commanded motion.', pt:'Reduzir drives seguidores. Reduzir o ciclo de trabalho do movimento comandado.' }},

{ code:'FLT S21', device:'k5500', cat:'FLT-S',
  name:{ en:'Converter Thermal Overload User Limit Fault', pt:'Falha de Sobrecarga Térmica do Conversor (Limite do Usuário)' },
  desc:{ en:'The converter thermal model has exceeded the limit given by Converter Thermal Overload User Limit.', pt:'O modelo térmico do conversor excedeu o limite definido pelo usuário.' },
  action:{ en:'Reduce number of shared DC follower drives. Reduce duty-cycle. Increase the Converter Thermal Overload UL attribute value.', pt:'Reduzir drives seguidores. Reduzir ciclo de trabalho. Aumentar o atributo Converter Thermal Overload UL.' }},

{ code:'FLT S23', device:'k5500', cat:'FLT-S',
  name:{ en:'AC Single Phase Loss Fault', pt:'Falha de Perda de Fase CA Única' },
  desc:{ en:'A single AC input phase was lost while the drive was enabled.', pt:'Uma única fase da entrada CA foi perdida enquanto o drive estava habilitado.' },
  action:{ en:'Check AC input voltage on all phases.', pt:'Verificar tensão de entrada CA em todas as fases.' }},

{ code:'FLT S25', device:'k5500', cat:'FLT-S',
  name:{ en:'Converter Pre-charge Failure Fault', pt:'Falha de Pré-carga do Conversor' },
  desc:{ en:'The pre-charge circuit monitoring algorithm detected the DC bus did not reach a factory set voltage level, or the DC-bus voltage is too high.', pt:'O algoritmo de monitoramento de pré-carga detectou que o barramento CC não atingiu o nível de tensão de fábrica, ou a tensão está muito alta.' },
  action:{ en:'Check AC input voltage on all phases. Check input power wiring. Check if any inverter or motor is shorted to ground. Replace drive if fault persists. Check multi-axis shared-bus configuration.', pt:'Verificar tensão de entrada CA. Verificar fiação de entrada. Verificar curto à terra. Substituir o drive se persistir. Verificar configuração de barramento compartilhado multi-eixo.' }},

{ code:'FLT S29', device:'k5500', cat:'FLT-S',
  name:{ en:'Bus Regulator Thermal Overload Factory Limit Fault', pt:'Falha de Sobrecarga Térmica do Regulador de Barramento (Limite de Fábrica)' },
  desc:{ en:'The shunt thermal model has exceeded its factory set thermal capacity limit.', pt:'O modelo térmico do shunt excedeu o limite de capacidade térmica de fábrica.' },
  action:{ en:'Modify the duty cycle. Add external shunt for additional capacity. Add capacitor module.', pt:'Modificar o ciclo de trabalho. Adicionar shunt externo. Adicionar módulo capacitor.' }},

{ code:'FLT S30', device:'k5500', cat:'FLT-S',
  name:{ en:'Bus Regulator Thermal Overload User Limit Fault', pt:'Falha de Sobrecarga Térmica do Regulador de Barramento (Limite do Usuário)' },
  desc:{ en:'The shunt thermal model has exceeded the thermal capacity limit given by Bus Regulator Thermal Overload User Limit.', pt:'O modelo térmico do shunt excedeu o limite definido pelo usuário.' },
  action:{ en:'Modify duty cycle. Add external shunt. Increase Bus Regulator Thermal Overload UL attribute value.', pt:'Modificar ciclo de trabalho. Adicionar shunt externo. Aumentar o atributo Bus Regulator Thermal Overload UL.' }},

{ code:'FLT S31', device:'k5500', cat:'FLT-S',
  name:{ en:'Bus Regulator Failure', pt:'Falha do Regulador de Barramento' },
  desc:{ en:'The shunt circuit has detected the shunt resistor is shorted.', pt:'O circuito de shunt detectou que o resistor de shunt está em curto-circuito.' },
  action:{ en:'Check for shorts in the shunt connector. Unplug and measure resistance of the shunt. Replace drive if shunt resistor is shorted.', pt:'Verificar curto no conector do shunt. Medir a resistência do shunt. Substituir o drive se o resistor estiver em curto.' }},

{ code:'FLT S33', device:'k5500', cat:'FLT-S',
  name:{ en:'Bus Undervoltage Factory Limit Fault', pt:'Falha de Subtensão do Barramento (Limite de Fábrica)' },
  desc:{ en:'DC Bus voltage level is below the factory set limit as determined by the configured input voltage.', pt:'O nível de tensão do barramento CC está abaixo do limite de fábrica determinado pela tensão de entrada configurada.' },
  action:{ en:'Verify voltage level of the incoming AC. Monitor AC power source for glitches or line droop. Install UPS on AC input.', pt:'Verificar tensão de entrada CA. Monitorar fonte CA. Instalar UPS na entrada CA.' }},

{ code:'FLT S34', device:'k5500', cat:'FLT-S',
  name:{ en:'Bus Undervoltage User Limit Fault', pt:'Falha de Subtensão do Barramento (Limite do Usuário)' },
  desc:{ en:'DC bus voltage level is below the user set limit given by Bus Undervoltage User Limit.', pt:'O nível de tensão do barramento CC está abaixo do limite definido pelo usuário.' },
  action:{ en:'Verify incoming AC voltage. Monitor AC source for glitches. Install UPS. Increase Bus Undervoltage UL attribute value.', pt:'Verificar tensão de entrada CA. Monitorar fonte CA. Instalar UPS. Aumentar o atributo Bus Undervoltage UL.' }},

{ code:'FLT S35', device:'k5500', cat:'FLT-S',
  name:{ en:'Bus Overvoltage Factory Limit Fault', pt:'Falha de Sobretensão do Barramento (Limite de Fábrica)' },
  desc:{ en:'DC bus voltage level is above the factory set limit as determined by the configured input voltage.', pt:'O nível de tensão do barramento CC está acima do limite de fábrica.' },
  action:{ en:'Change the deceleration or motion profile of all drives connected to the DC bus. Unplug shunt connector and measure resistance. Replace drive if shunt resistor is open.', pt:'Alterar o perfil de desaceleração de todos os drives no barramento CC. Medir resistência do shunt. Substituir o drive se o shunt estiver aberto.' }},

{ code:'FLT S39', device:'k5500', cat:'FLT-S',
  name:{ en:'Bus Power Leakage Fault', pt:'Falha de Vazamento de Energia do Barramento' },
  desc:{ en:'Measured converter power exceeded estimated inverter output power by more than a factory limit.', pt:'A potência medida do conversor excedeu a potência estimada de saída do inversor em mais do que o limite de fábrica.' },
  action:{ en:'Check bus power sharing configuration attribute. Check AC input and DC bus-sharing connections.', pt:'Verificar o atributo de configuração de compartilhamento de ener
