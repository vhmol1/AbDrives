<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Falhas - Rockwell Offline</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e24">
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #eeeeee;
            --accent-color: #ff3333; /* Vermelho Rockwell */
            --text-secondary: #adadb8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0;
            color: var(--text-color);
        }

        .search-box {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: var(--card-bg);
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .search-box:focus {
            outline: 2px solid var(--accent-color);
        }

        .filter-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .filter-container::-webkit-scrollbar {
            height: 4px;
        }
        .filter-container::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }

        .filter-btn {
            background-color: var(--card-bg);
            color: var(--text-secondary);
            border: 1px solid #333;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .falha-card {
            background-color: var(--card-bg);
            border-left: 4px solid var(--accent-color);
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .falha-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .codigo {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        .modelo-tag {
            font-size: 0.75rem;
            background-color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--text-secondary);
            font-weight: bold;
        }

        .nome-falha {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .descricao {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .detalhes-titulo {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-color);
            margin: 12px 0 6px 0;
            font-weight: bold;
        }

        ul {
            margin: 0;
            padding-left: 18px;
            font-size: 0.9rem;
            color: var(--text-color);
        }

        li {
            margin-bottom: 6px;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <header>
        <h1>Guia de Falhas Rockwell</h1>
    </header>

    <input type="text" id="search" class="search-box" placeholder="Procure por código, nome ou descrição...">

    <div class="filter-container" id="filters">
        <button class="filter-btn active" onclick="filtrarModelo('TODOS')">Todos</button>
        <button class="filter-btn" onclick="filtrarModelo('PowerFlex 40')">PF 40</button>
        <button class="filter-btn" onclick="filtrarModelo('PowerFlex 525')">PF 525</button>
        <button class="filter-btn" onclick="filtrarModelo('PowerFlex 700')">PF 700</button>
        <button class="filter-btn" onclick="filtrarModelo('PowerFlex 750')">PF 750</button>
        <button class="filter-btn" onclick="filtrarModelo('Kinetix 6000')">Kinetix 6000</button>
        <button class="filter-btn" onclick="filtrarModelo('Kinetix 6500')">Kinetix 6500</button>
        <button class="filter-btn" onclick="filtrarModelo('Kinetix 5700')">Kinetix 5700</button>
    </div>

    <div id="lista-falhas"></div>

            {modelo:"PowerFlex 40", codigo:"F8", falha:"Heatsink Ovtg", descricao:"Temperatura do dissipador de calor acima do limite seguro.", causas:["Ventoinha de refrigeração traseira suja, obstruída ou queimada."], solucoes:["Limpar as aletas do dissipador com ar comprimido e testar o cooler."]},
            {modelo:"PowerFlex 40", codigo:"F12", falha:"HW OverCurrent", descricao:"Corrente de saída atingiu o limite físico máximo do hardware.", causas:["Curto-circuito severo entre fases de saída ou falha no módulo IGBT."], solucoes:["Desconectar o motor e testar o inversor sem carga."]},

            {modelo:"Kinetix 5700", codigo:"F019", falha:"Feedback Device Loss", descricao:"Perda de conexão do dispositivo de feedback digital inteligente.", causas:["Rompimento ou mau contato no cabo único de tecnologia digital DSL."], solucoes:["Garantir o aperto correto do suporte de aterramento metálico (shield clamp)."]},
            {modelo:"Kinetix 5700", codigo:"F031", falha:"Safe Torque Off Flt", descricao:"Discrepância de status detectada nas entradas de segurança STO.", causas:["Um dos canais redundantes abriu de forma dessincronizada."], solucoes:["Verificar o relé de segurança ou o módulo digital GuardLogix do CLP."]},
            {modelo:"Kinetix 5700", codigo:"F045", falha:"Motor Thermal Overload", descricao:"Modelo eletrônico de temperatura do servo motor atingiu o limite crítico.", causas:["Ciclo de trabalho da máquina excessivo para a dimensão do motor."], solucoes:["Otimizar as curvas de movimento e tempos de ciclo no programa."]}
        ];

        // FUNÇÕES DO SISTEMA DE BUSCA E FILTRAGEM
        function renderizarFalhas() {
            const container = document.getElementById('lista-falhas');
            const termoBusca = document.getElementById('search').value.toLowerCase();
            
            container.innerHTML = '';

            const filtrados = dadosFalhas.filter(item => {
                const correspondeModelo = (modeloAtual === 'TODOS' || item.modelo === modeloAtual);
                const correspondeBusca = item.codigo.toLowerCase().includes(termoBusca) || 
                                         item.falha.toLowerCase().includes(termoBusca) || 
                                         item.descricao.toLowerCase().includes(termoBusca);
                return correspondeModelo && correspondeBusca;
            });

            if(filtrados.length === 0) {
                container.innerHTML = `<p style="text-align:center; color: var(--text-secondary); padding: 20px;">Nenhuma falha correspondente encontrada.</p>`;
                return;
            }

            filtrados.forEach(item => {
                const card = document.createElement('div');
                card.className = 'falha-card';
                card.innerHTML = `
                    <div class="falha-header">
                        <span class="codigo">${item.codigo}</span>
                        <span class="modelo-tag">${item.modelo}</span>
                    </div>
                    <div class="nome-falha">${item.falha}</div>
                    <div class="descricao">${item.descricao}</div>
                    
                    <div class="detalhes-titulo">Possíveis Causas</div>
                    <ul>${item.causas.map(c => `<li>${c}</li>`).join('')}</ul>
                    
                    <div class="detalhes-titulo">Soluções Recomendadas</div>
                    <ul>${item.solucoes.map(s => `<li>${s}</li>`).join('')}</ul>
                `;
                container.appendChild(card);
            });
        }

        function filtrarModelo(modelo) {
            modeloAtual = modelo;
            
            const botoes = document.querySelectorAll('.filter-btn');
            botoes.forEach(btn => btn.classList.remove('active'));
            
            botoes.forEach(btn => {
                if (modelo === 'TODOS' && btn.textContent === 'Todos') btn.classList.add('active');
                if (modelo === 'PowerFlex 40' && btn.textContent === 'PF 40') btn.classList.add('active');
                if (modelo === 'PowerFlex 525' && btn.textContent === 'PF 525') btn.classList.add('active');
                if (modelo === 'PowerFlex 700' && btn.textContent === 'PF 700') btn.classList.add('active');
                if (modelo === 'PowerFlex 750' && btn.textContent === 'PF 750') btn.classList.add('active');
                if (modelo === 'Kinetix 6000' && btn.textContent === 'Kinetix 6000') btn.classList.add('active');
                if (modelo === 'Kinetix 6500' && btn.textContent === 'Kinetix 6500') btn.classList.add('active');
                if (modelo === 'Kinetix 5700' && btn.textContent === 'Kinetix 5700') btn.classList.add('active');
            });
            
            renderizarFalhas();
        }

        document.getElementById('search').addEventListener('input', renderizarFalhas);
        
        // Inicializa a exibição padrão
        renderizarFalhas();

        // REGISTRO DO SERVICE WORKER (PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("Service Worker ativo e pronto!"))
            .catch(err => console.log("Erro no SW:", err));
        }
    </script>
</body>
