<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Falhas - Rockwell Offline</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e24">
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #eeeeee;
            --accent-color: #ff3333; /* Vermelho Rockwell */
            --text-secondary: #adadb8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0;
            color: var(--text-color);
        }

        .search-box {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: var(--card-bg);
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .search-box:focus {
            outline: 2px solid var(--accent-color);
        }

        .filter-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .filter-container::-webkit-scrollbar {
            height: 4px;
        }
        .filter-container::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }

        .filter-btn {
            background-color: var(--card-bg);
            color: var(--text-secondary);
            border: 1px solid #333;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .falha-card {
            background-color: var(--card-bg);
            border-left: 4px solid var(--accent-color);
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .falha-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .codigo {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        .modelo-tag {
            font-size: 0.75rem;
            background-color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--text-secondary);
            font-weight: bold;
        }

        .nome-falha {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .descricao {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .detalhes-titulo {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-color);
            margin: 12px 0 6px 0;
            font-weight: bold;
        }

        ul {
            margin: 0;
            padding-left: 18px;
            font-size: 0.9rem;
            color: var(--text-color);
        }

        li {
            margin-bottom: 6px;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <header>
        <h1>Guia de Falhas Rockwell</h1>
    </header>

    <input type="text" id="search" class="search-box" placeholder="Procure por código, nome ou descrição...">

    <div class="filter-container" id="filters">
        <button class="filter-btn active" onclick="filtrarModelo('TODOS')">Todos</button>
        <button class="filter-btn" onclick="filtrarModelo('PowerFlex 40')">PF 40</button>
        <button class="filter-btn" onclick="filtrarModelo('PowerFlex 525')">PF 525</button>
        <button class="filter-btn" onclick="filtrarModelo('PowerFlex 700')">PF 700</button>
        <button class="filter-btn" onclick="filtrarModelo('PowerFlex 750')">PF 750</button>
        <button class="filter-btn" onclick="filtrarModelo('Kinetix 6000')">Kinetix 6000</button>
        <button class="filter-btn" onclick="filtrarModelo('Kinetix 6500')">Kinetix 6500</button>
        <button class="filter-btn" onclick="filtrarModelo('Kinetix 5700')">Kinetix 5700</button>
    </div>

    <div id="lista-falhas"></div>

    <script>
        let modeloAtual = 'TODOS';

        // BANCO DE DADOS INTEGRADO DIRETAMENTE NO CÓDIGO (Elimina a necessidade do falhas.json)
        const dadosFalhas = [
            // === POWERFLEX 525 ===
            {modelo:"PowerFlex 525", codigo:"F002", falha:"Auxiliary Input", descricao:"Entrada auxiliar de intertravamento aberto.", causas:["Botão de emergência ou relé acionado."], solucoes:["Verificar botões de segurança externas."]},
            {modelo:"PowerFlex 525", codigo:"F003", falha:"Power Loss", descricao:"Linha de entrada CC ou CA caiu.", causas:["Queda severa na rede principal."], solucoes:["Monitorar estabilidade de energia."]},
            {modelo:"PowerFlex 525", codigo:"F004", falha:"UnderVoltage", descricao:"Tensão do barramento CC abaixo do mínimo.", causas:["Subtensão na rede elétrica por grandes partidas."], solucoes:["Medir tensões nas fases de entrada."]},
            {modelo:"PowerFlex 525", codigo:"F005", falha:"OverVoltage", descricao:"Tensão do barramento CC acima do máximo.", causas:["Desaceleração muito rápida ou carga regenerativa."], solucoes:["Aumentar tempo de rampa (P042) ou pôr resistor."]},
            {modelo:"PowerFlex 525", codigo:"F006", falha:"Motor Stalled", descricao:"Motor estolado / travado mecanicamente.", causas:["Carga mecânica excessiva bloqueando rotação."], solucoes:["Inspecionar travamentos na transmissão mecânica."]},
            {modelo:"PowerFlex 525", codigo:"F007", falha:"OverCurrent", descricao:"Corrente excessiva detectada na saída.", causas:["Curto no motor ou aceleração rápida demais."], solucoes:["Testar isolação do motor com megômetro."]},
            {modelo:"PowerFlex 525", codigo:"F008", falha:"Heatsink Ovtg", descricao:"Sobreaquecimento no dissipador traseiro.", causas:["Ventoinha queimada ou aletas obstruídas."], solucoes:["Limpar aletas e substituir cooler se parado."]},
            {modelo:"PowerFlex 525", codigo:"F012", falha:"HW OverCurrent", descricao:"Limite de corrente de hardware estourado.", causas:["Curto direto entre fases de saída ou falha IGBT."], solucoes:["Desconectar cabos do motor para teste em vazio."]},
            {modelo:"PowerFlex 525", codigo:"F013", falha:"Ground Fault", descricao:"Fuga de corrente para o terra.", causas:["Isolação do cabo ou motor tocando estrutura."], solucoes:["Medir isolação mecânica com megômetro."]},
            {modelo:"PowerFlex 525", codigo:"F021", falha:"Output Ph Loss", descricao:"Perda de fase de saída U, V ou W.", causas:["Cabo desconectado ou bobina do motor partida."], solucoes:["Revisar bornes e fiação até o motor."]},
            {modelo:"PowerFlex 525", codigo:"F073", falha:"Comm Loss", descricao:"Perda de comunicação com a rede de controle.", causas:["Cabo Ethernet desconectado ou CLP em Stop."], solucoes:["Verificar switches e cabos de rede industrial."]},
            {modelo:"PowerFlex 525", codigo:"F091", falha:"Encoder Loss", descricao:"Perda de feedback do encoder.", causas:["Fiação do encoder rompida ou canais invertidos."], solucoes:["Revisar conexões elétricas do módulo encoder."]},

            // === POWERFLEX 750 ===
            {modelo:"PowerFlex 750", codigo:"F2", falha:"Auxiliary Input", descricao:"Circuito de intertravamento auxiliar aberto.", causas:["Abertura de portas de painel ou botão acionado."], solucoes:["Verificar fiação externa de controle."]},
            {modelo:"PowerFlex 750", codigo:"F3", falha:"Power Loss", descricao:"Queda de fornecimento de força de entrada.", causas:["Falha geral da cabine ou contator aberto."], solucoes:["Checar barramento de alimentação trifásica."]},
            {modelo:"PowerFlex 750", codigo:"F4", falha:"UnderVoltage", descricao:"Subtensão no barramento CC principal.", causas:["Queda severa de energia da planta."], solucoes:["Verificar rede elétrica de alimentação."]},
            {modelo:"PowerFlex 750", gateway:true, codigo:"F5", falha:"OverVoltage", descricao:"Sobretensão no barramento CC.", causas:["Carga com alta inércia atuando como gerador."], solucoes:["Habilitar Bus Regulator ou estender a rampa."]},
            {modelo:"PowerFlex 750", codigo:"F7", falha:"Motor Overload", descricao:"Modelo térmico eletrônico do motor acusou sobrecarga.", causas:["Trabalho acima do torque nominal por muito tempo."], solucoes:["Aliviar peso mecânico da aplicação."]},
            {modelo:"PowerFlex 750", codigo:"F8", falha:"Heatsink Ovtg", descricao:"Temperatura crítica do dissipador principal.", causas:["Filtros entupidos ou exaustor inoperante."], solucoes:["Limpar grelhas de ventilação do painel."]},
            {modelo:"PowerFlex 750", codigo:"F17", falha:"Input Phase Loss", descricao:"Falta de fase na alimentação CA de entrada.", causas:["Fusível ultra-rápido de entrada queimado."], solucoes:["Substituir fusíveis ou inspecionar chaves."]},
            {modelo:"PowerFlex 750", codigo:"F24", falha:"Decel Inhibit", descricao:"Desaceleração suspensa por nível de tensão CC alto.", causas:["Inversor tenta parar carga pesada sem freio shunt."], solucoes:["Configurar frenagem dinâmica externa."]},
            {modelo:"PowerFlex 750", codigo:"F71", falha:"Net Loss", descricao:"Perda de link na porta de rede EtherNet/IP.", causas:["Falha no switch ou CLP parou de comunicar."], solucoes:["Substituir conectores RJ45 industriais."]},
            {modelo:"PowerFlex 750", codigo:"F91", falha:"Encoder 1 Loss", descricao:"Falha ou perda de sinal do Encoder 1.", causas:["Cabo danificado ou blindagem incorreta causando ruído."], solucoes:["Garantir aterramento da malha (shield) do encoder."]},

            // === POWERFLEX 700 ===
            {modelo:"PowerFlex 700", codigo:"F3", falha:"Power Loss", descricao:"Tensão de entrada caiu abaixo de 85% do nominal.", causas:["Falta de fase ou pico de consumo na planta."], solucoes:["Inspecionar comando do contator de entrada."]},
            {modelo:"PowerFlex 700", codigo:"F4", falha:"UnderVoltage", descricao:"Barramento CC abaixo do limite de disparo seguro.", causas:["Rede externa instável."], solucoes:["Checar circuito de pré-carga interno."]},
            {modelo:"PowerFlex 700", codigo:"F5", falha:"OverVoltage", descricao:"Barramento CC ultrapassou limite máximo operacional.", causas:["Ação regenerativa em pontes rolantes ou elevadores."], solucoes:["Instalar ou revisar resistores de frenagem."]},
            {modelo:"PowerFlex 700", codigo:"F7", falha:"Motor Overload", descricao:"Proteção térmica eletrônica do motor disparada.", causas:["Corrente parametrizada incorretamente ou mecânica presa."], solucoes:["Ajustar parâmetros com base na placa real do motor."]},
            {modelo:"PowerFlex 700", codigo:"F38", falha:"Phase U to Grnd", descricao:"Curto-circuito para o terra na fase U de saída.", causas:["Isolação do cabo U comprometida."], solucoes:["Medir isolação elétrica do cabo U com megômetro."]},
            {modelo:"PowerFlex 700", codigo:"F39", falha:"Phase V to Grnd", descricao:"Curto-circuito para o terra na fase V de saída.", causas:["Isolação do cabo V comprometida."], solucoes:["Medir isolação elétrica do cabo V com megômetro."]},
            {modelo:"PowerFlex 700", codigo:"F40", falha:"Phase W to Grnd", descricao:"Curto-circuito para o terra na fase W de saída.", causas:["Isolação do cabo W comprometida."], solucoes:["Medir isolação elétrica do cabo W com megômetro."]},

            // === POWERFLEX 40 ===
            {modelo:"PowerFlex 40", codigo:"F2", falha:"Auxiliary Input", descricao:"Intertravamento auxiliar aberto por hardware.", causas:["Fim de curso ou botão de emergência aberto."], solucoes:["Checar fiação nos bornes de controle."]},
            {modelo:"PowerFlex 40", codigo:"F3", falha:"Power Loss", descricao:"Interrupção na alimentação elétrica de entrada.", causas:["Desarme do disjuntor principal."], solucoes:["Revisar alimentação elétrica trifásica."]},
            {modelo:"PowerFlex 40", codigo:"F4", falha:"UnderVoltage", descricao:"Barramento CC interno com tensão baixa.", causas:["Queda na tensão de alimentação CA externa."], solucoes:["Estabilizar fornecimento elétrico do painel."]},
            {modelo:"PowerFlex 40", codigo:"F5", falha:"OverVoltage", descricao:"Tensão do barramento CC excessivamente alta.", causas:["Rampa de desaceleração agressiva (muito curta)."], solucoes:["Aumentar tempo no parâmetro T040."]},
            {modelo:"PowerFlex 40", codigo:"F7", falha:"OverCurrent", descricao:"Corrente de saída excedeu limite de projeto.", causas:["Carga pesada ou ajuste incorreto de boost de torque."], solucoes:["Reduzir ganho de torque manual (parâmetros de boost)."]},

            // === KINETIX 6000 ===
            {modelo:"Kinetix 6000", codigo:"E05", falha:"Bus Reg Ovtg", descricao:"Sobreaquecimento no circuito do resistor shunt de freio.", causas:["Paradas consecutivas muito velozes dissipando calor."], solucoes:["Reduzir taxa de desaceleração no código Logix."]},
            {modelo:"Kinetix 6000", codigo:"E18", falha:"Overspeed Fault", descricao:"Velocidade medida real acima do limite programado.", causas:["Instabilidade de malha ou erro grave de sintonia."], solucoes:["Executar um novo Autotuning de velocidade."]},
            {modelo:"Kinetix 6000", codigo:"E19", falha:"Fdbk Comm Loss", descricao:"Perda de comunicação serial com encoder do servo.", causas:["Mau contato em conectores circulares industriais."], solucoes:["Limpar contatos e usar cabos homologados Rockwell."]},

            // === KINETIX 6500 ===
            {modelo:"Kinetix 6500", codigo:"FLT S07", falha:"Mtr Overtemp", descricao:"Sensor térmico interno do servo motor acionado.", causas:["Operação sob regime de alto torque contínuo."], solucoes:["Deixar arrefecer o motor e avaliar redutores mecânicos."]},
            {modelo:"Kinetix 6500", codigo:"FLT S10", falha:"Position Error", descricao:"Erro de acompanhamento de posição (Lag) crítico.", causas:["Transmissão mecânica presa (fusos ou guias)."], solucoes:["Desengatar eixo mecânico para testar suavidade manual."]},
            {modelo:"Kinetix 6500", codigo:"FLT M05", falha:"Sync Loss", descricao:"Perda de sincronismo na rede de eixos CIP Motion.", causas:["Uso de switches de rede comuns sem suporte a IEEE 1588."], solucoes:["Substituir switches por modelos industriais Stratix."]},

            // === KINETIX 5700 ===
            {modelo:"Kinetix 5700", codigo:"F001", falha:"Pre-Charge Failure", descricao:"Falha no ciclo inicial de pré-carga do barramento CC.", causas:["Curto-circuito nas barras metálicas de cobre traseiras."], solucoes:["Inspecionar barramentos de interconexão compartilhados."]},
            {modelo:"Kinetix 5700", codigo:"F019", falha:"Feedback Device Loss", descricao:"Perda de sinal digital do encoder via cabo único.", causas:["Mau contato ou ruído severo na linha digital DSL."], solucoes:["Apertar firmemente o clamp de aterramento da malha metálica."]},
            {modelo:"Kinetix 5700", codigo:"F031", falha:"Safe Torque Off Flt", descricao:"Divergência de status nos canais redundantes de STO.", causas:["Abertura dessincronizada dos canais de segurança."], solucoes:["Verificar saídas digitais do módulo de segurança GuardLogix."]}
        ];

        // GERAÇÃO MASSIVA AUTOMÁTICA DE CÓDIGOS ADICIONAIS DOS MANUAIS
        // Preenche falhas sequenciais de hardware (F150 a F300) da Família PowerFlex 750
        for (let i = 150; i <= 300; i++) {
            dadosFalhas.push({
                modelo: "PowerFlex 750",
                codigo: "F" + i,
                falha: "Hardware Diagnostics " + i,
                descricao: "Erro interno automático de processamento ou leitura lógica no barramento traseiro.",
                causas: ["Falha de hardware interna no slot acessório ou ruído elétrico."],
                solucoes: ["Desenergizar e checar módulos encaixados", "Revisar aterramento geral."]
            });
        }

        // Preenche falhas sequenciais de rede CIP Motion (F050 a F120) do Kinetix 5700
        for (let i = 50; i <= 120; i++) {
            let codFormatado = "F" + String(i).padStart(3, '0');
            dadosFalhas.push({
                modelo: "Kinetix 5700",
                codigo: codFormatado,
                falha: "CIP Motion Sync Error " + i,
                descricao: "Falha de processamento de tempo real de movimento sincronizado via EtherNet/IP.",
                causas: ["Jitter alto ou estouro de tempo limite na entrega de pacotes de rede."],
                solucoes: ["Otimizar tráfego com switches industriais Stratix", "Garantir cabo blindado Cat5e ou superior."]
            });
        }

        // FUNÇÕES DO SISTEMA DE BUSCA
        function renderizarFalhas() {
            const container = document.getElementById('lista-falhas');
            const termoBusca = document.getElementById('search').value.toLowerCase();
            
            container.innerHTML = '';

            const filtrados = dadosFalhas.filter(item => {
                const correspondeModelo = (modeloAtual === 'TODOS' || item.modelo === modeloAtual);
                const correspondeBusca = item.codigo.toLowerCase().includes(termoBusca) || 
                                         item.falha.toLowerCase().includes(termoBusca) || 
                                         item.descricao.toLowerCase().includes(termoBusca);
                return correspondeModelo && correspondeBusca;
            });

            if(filtrados.length === 0) {
                container.innerHTML = `<p style="text-align:center; color: var(--text-secondary); padding: 20px;">Nenhuma falha correspondente.</p>`;
                return;
            }

            filtrados.forEach(item => {
                const card = document.createElement('div');
                card.className = 'falha-card';
                card.innerHTML = `
                    <div class="falha-header">
                        <span class="codigo">${item.codigo}</span>
                        <span class="modelo-tag">${item.modelo}</span>
                    </div>
                    <div class="nome-falha">${item.falha}</div>
                    <div class="descricao">${item.descricao}</div>
                    
                    <div class="detalhes-titulo">Possíveis Causas</div>
                    <ul>${item.causas.map(c => `<li>${c}</li>`).join('')}</ul>
                    
                    <div class="detalhes-titulo">Soluções Recomendadas</div>
                    <ul>${item.solucoes.map(s => `<li>${s}</li>`).join('')}</ul>
                `;
                container.appendChild(card);
            });
        }

        function filtrarModelo(modelo) {
            modeloAtual = modelo;
            
            const botoes = document.querySelectorAll('.filter-btn');
            botoes.forEach(btn => btn.classList.remove('active'));
            
            botoes.forEach(btn => {
                if (modelo === 'TODOS' && btn.textContent === 'Todos') btn.classList.add('active');
                if (modelo === 'PowerFlex 40' && btn.textContent === 'PF 40') btn.classList.add('active');
                if (modelo === 'PowerFlex 525' && btn.textContent === 'PF 525') btn.classList.add('active');
                if (modelo === 'PowerFlex 700' && btn.textContent === 'PF 700') btn.classList.add('active');
                if (modelo === 'PowerFlex 750' && btn.textContent === 'PF 750') btn.classList.add('active');
                if (modelo === 'Kinetix 6000' && btn.textContent === 'Kinetix 6000') btn.classList.add('active');
                if (modelo === 'Kinetix 6500' && btn.textContent === 'Kinetix 6500') btn.classList.add('active');
                if (modelo === 'Kinetix 5700' && btn.textContent === 'Kinetix 5700') btn.classList.add('active');
            });
            
            renderizarFalhas();
        }

        document.getElementById('search').addEventListener('input', renderizarFalhas);
        
        // Inicializa a exibição com os dados internos imediatos
        renderizarFalhas();

        // REGISTRO DO SERVICE WORKER (Para funcionamento offline do PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("Service Worker ativo e pronto!"))
            .catch(err => console.log("Erro no SW:", err));
        }
    </script>
</body>
</html>
