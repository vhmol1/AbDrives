<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Falhas - Rockwell</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e24">
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #eeeeee;
            --accent-color: #ff3333; /* Vermelho Rockwell */
            --text-secondary: #adadb8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            color: var(--text-color);
        }

        .search-box {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: var(--card-bg);
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .search-box:focus {
            outline: 2px solid var(--accent-color);
        }

        .filter-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .filter-btn {
            background-color: var(--card-bg);
            color: var(--text-secondary);
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
        }

        .filter-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .falha-card {
            background-color: var(--card-bg);
            border-left: 4px solid var(--accent-color);
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .falha-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .codigo {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        .modelo-tag {
            font-size: 0.8rem;
            background-color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--text-secondary);
        }

        .nome-falha {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .descricao {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .detalhes-titulo {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-color);
            margin: 8px 0 4px 0;
        }

        ul {
            margin: 0;
            padding-left: 20px;
            font-size: 0.9rem;
            color: var(--text-color);
        }

        li {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Manuais de Falhas Rockwell</h1>
    </header>

    <input type="text" id="search" class="search-box" placeholder="Digite o código ou nome da falha...">

    <div class="filter-container" id="filters">
        <button class="filter-btn active" onclick="filtrarModelo('TODOS')">Todos</button>
        <button class="filter-btn" onclick="filtrarModelo('PowerFlex 525')">PF 525</button>
        <button class="filter-btn" onclick="filtrarModelo('PowerFlex 750')">PF 750 Series</button>
    </div>

    <div id="lista-falhas"></div>

    <script>
        // Banco de dados simulado (Você pode expandir esta lista à vontade!)
        const dadosFalhas = [
            {
                "modelo": "PowerFlex 525",
                "codigo": "F004",
                "falha": "UnderVoltage",
                "descricao": "A tensão do barramento CC caiu abaixo do valor mínimo.",
                "causas": ["Tensão de linha muito baixa.", "Queda de energia transitória.", "Fusível de entrada queimado."],
                "solucoes": ["Verificar a tensão da rede de entrada.", "Checar o estado dos fusíveis de proteção."]
            },
            {
                "modelo": "PowerFlex 525",
                "codigo": "F007",
                "falha": "OverCurrent",
                "descricao": "O inversor detectou uma corrente excessiva na saída.",
                "causas": ["Carga mecânica no motor muito alta (travamento).", "Tempo de aceleração muito curto.", "Curto-circuito nos cabos do motor."],
                "solucoes": ["Verificar se o eixo do motor gira livremente.", "Aumentar o tempo de aceleração (Parâmetro A413).", "Testar a isolação dos cabos do motor."]
            },
            {
                "modelo": "PowerFlex 750",
                "codigo": "F9",
                "falha": "Transistor Ovtg",
                "descricao": "A temperatura dos transistores de potência (IGBT) excedeu o limite seguro.",
                "causas": ["Temperatura ambiente muito alta.", "Ventoinha de refrigeração obstruída ou danificada.", "Excesso de carga contínua."],
                "solucoes": ["Verificar se as ventoinhas do inversor estão girando.", "Limpar os dissipadores de calor.", "Reduzir a frequência de chaveamento se possível."]
            }
        ];

        let modeloAtual = 'TODOS';

        function renderizarFalhas() {
            const container = document.getElementById('lista-falhas');
            const termoBusca = document.getElementById('search').value.toLowerCase();
            
            container.innerHTML = '';

            const filtrados = dadosFalhas.filter(item => {
                const correspondeModelo = (modeloAtual === 'TODOS' || item.modelo === modeloAtual);
                const correspondeBusca = item.codigo.toLowerCase().includes(termoBusca) || 
                                         item.falha.toLowerCase().includes(termoBusca) || 
                                         item.descricao.toLowerCase().includes(termoBusca);
                return correspondeModelo && correspondeBusca;
            });

            if(filtrados.length === 0) {
                container.innerHTML = `<p style="text-align:center; color: var(--text-secondary);">Nenhuma falha encontrada.</p>`;
                return;
            }

            filtrados.forEach(item => {
                const card = document.createElement('div');
                card.className = 'falha-card';
                card.innerHTML = `
                    <div class="falha-header">
                        <span class="codigo">${item.codigo}</span>
                        <span class="modelo-tag">${item.modelo}</span>
                    </div>
                    <div class="nome-falha">${item.falha}</div>
                    <div class="descricao">${item.descricao}</div>
                    
                    <div class="detalhes-titulo">Possíveis Causas</div>
                    <ul>${item.causas.map(c => `<li>${c}</li>`).join('')}</ul>
                    
                    <div class="detalhes-titulo">Soluções Recomendadas</div>
                    <ul>${item.solucoes.map(s => `<li>${s}</li>`).join('')}</ul>
                `;
                container.appendChild(card);
            });
        }

        function filtrarModelo(modelo) {
            modeloAtual = modelo;
            const botoes = document.querySelectorAll('.filter-btn');
            botoes.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderizarFalhas();
        }

        document.getElementById('search').addEventListener('input', renderizarFalhas);
        
        // Inicializa a tela
        renderizarFalhas();

        // Registro do Service Worker para funcionamento Offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker registrado com sucesso!"))
            .catch(err => console.log("Falha ao registrar Service Worker:", err));
        }
    </script>
</body>
</html>
