<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rockwell Automation - Fault & Alarm Central</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --primary: #cd1a2b;
    --primary-dark: #a5121e;
    --dark: #1a1d2e;
    --dark2: #2d3142;
    --light-bg: #f4f5f7;
    --card-bg: #ffffff;
    --border: #e1e4e8;
    --text: #1a1d2e;
    --muted: #5e6278;
    --badge-bg: #eef0f4;
    --tag-colors: #e8f4fd;
    --search-bg: #ffffff;
  }
  [data-theme="dark"] {
    --light-bg: #0f1117;
    --card-bg: #1a1d2e;
    --border: #2d3142;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --badge-bg: #2d3142;
    --search-bg: #161925;
  }
  *, *::before, *::after { transition: background-color 0.2s, border-color 0.2s, color 0.15s; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--light-bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--dark);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .rockwell-badge {
    background: var(--primary);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .header-title h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .header-title p { font-size: 12px; color: #8b90a0; margin-top: 1px; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .lang-btn, .theme-btn {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .lang-btn:hover, .theme-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }
  .theme-btn { font-size: 15px; padding: 6px 10px; }
  .count-badge {
    background: rgba(255,255,255,0.08);
    color: #8b90a0;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    white-space: nowrap;
  }

  /* SEARCH BAR */
  .search-bar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    font-size: 15px;
    pointer-events: none;
  }
  .search-bar input[type="text"] {
    width: 100%;
    padding: 9px 12px 9px 34px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    background: var(--light-bg);
  }
  .search-bar input[type="text"]:focus { border-color: var(--primary); background: #fff; }
  .search-bar select {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13px;
    outline: none;
    background: var(--light-bg);
    cursor: pointer;
    min-width: 200px;
  }
  .search-bar select:focus { border-color: var(--primary); }

  /* CATEGORY FILTER PILLS */
  .category-filters {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .cat-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-right: 4px; }
  .pill {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--light-bg);
    color: var(--muted);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--primary); color: var(--primary); }
  .pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* GRID */
  .grid-wrap { padding: 20px 24px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: box-shadow 0.2s, transform 0.15s;
    cursor: default;
  }
  .card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .fault-code {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    font-family: 'Courier New', monospace;
    letter-spacing: -0.01em;
  }
  .tags { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
  .tag {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .tag-device { background: #eef2ff; color: #4338ca; }
  .tag-cat   { background: #fef3c7; color: #92400e; }
  .tag-flt-s  { background: #fee2e2; color: #991b1b; }
  .tag-flt-m  { background: #fce7f3; color: #9d174d; }
  .tag-init   { background: #ede9fe; color: #5b21b6; }
  .tag-inhibit{ background: #e0f2fe; color: #0369a1; }
  .tag-node   { background: #f0fdf4; color: #166534; }
  .tag-safe   { background: #fff7ed; color: #c2410c; }

  .fault-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .fault-desc {
    font-size: 13px;
    color: #444;
    background: var(--light-bg);
    padding: 8px 10px;
    border-radius: 6px;
    border-left: 3px solid var(--border);
    line-height: 1.55;
  }
  .fault-action { font-size: 12.5px; color: var(--muted); border-top: 1px dashed var(--border); padding-top: 8px; }
  .action-label { font-weight: 700; color: #1e6a9c; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .no-results-icon { font-size: 40px; margin-bottom: 12px; }
  .no-results h3 { font-size: 16px; margin-bottom: 6px; }

  @media (max-width: 640px) {
    header { padding: 12px 16px; }
    .header-title h1 { font-size: 14px; }
    .rockwell-badge { display: none; }
    .search-bar, .category-filters { padding: 10px 16px; }
    .grid-wrap { padding: 14px 16px; }
    .grid { grid-template-columns: 1fr; }
    .count-badge { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="rockwell-badge">Rockwell</span>
    <div class="header-title">
      <h1 id="hdr-title">Fault &amp; Alarm Central</h1>
      <p id="hdr-sub">Consolidated Technical Reference · Offline Ready</p>
    </div>
  </div>
  <div class="header-actions">
    <span class="count-badge" id="count-badge">0 faults</span>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">PT</button>
  </div>
</header>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" oninput="applyFilters()"
      placeholder="Search code, keyword, description...">
  </div>
  <select id="deviceFilter" onchange="applyFilters()">
    <option value="all" data-pt="Todos os dispositivos">All Devices</option>
    <option value="pf40"  data-pt="PowerFlex 40">PowerFlex 40</option>
    <option value="pf520" data-pt="PowerFlex 520 Series">PowerFlex 520 Series (523/525)</option>
    <option value="pf700" data-pt="PowerFlex 700">PowerFlex 700</option>
    <option value="pf750" data-pt="PowerFlex 750 Series">PowerFlex 750 Series</option>
    <option value="k5500" data-pt="Kinetix 5500">Kinetix 5500</option>
    <option value="k5700" data-pt="Kinetix 5700">Kinetix 5700</option>
    <option value="k6000" data-pt="Kinetix 6000">Kinetix 6000</option>
    <option value="k6200" data-pt="Kinetix 6200/6500">Kinetix 6200/6500</option>
  </select>
</div>

<div class="category-filters" id="catFilters">
  <span class="cat-label" id="cat-label">Category:</span>
</div>

<div class="grid-wrap">
  <div class="grid" id="faultsGrid"></div>
</div>

<script>

  desc:{ en:'A single AC input phase was lost.', pt:'Uma única fase da entrada CA foi perdida.' },
  action:{ en:'Check AC input voltage on all phases.', pt:'Verificar tensão de entrada CA em todas as fases.' }},

{ code:'FLT S25', device:'k5700', cat:'FLT-S',
  name:{ en:'Pre-charge Failure Fault', pt:'Falha de Pré-carga' },
  desc:{ en:'The pre-charge circuit monitoring algorithm detected the DC bus did not reach a factory set voltage level, or the DC-bus voltage is too high.', pt:'O algoritmo de monitoramento do circuito de pré-carga detectou que o barramento CC não atingiu o nível de tensão de fábrica, ou a tensão está muito alta.' },
  action:{ en:'Check AC input voltage on all phases. Check input power wiring. Check if any inverter or motor is shorted to ground. Replace power supply if fault persists.', pt:'Verificar tensão de entrada CA. Verificar fiação de entrada. Verificar curto à terra em inversores/motores. Substituir fonte se persistir.' }},

{ code:'FLT S27', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Regulator Overtemperature Factory Limit Fault', pt:'Falha de Sobretemperatura do Regulador de Barramento' },
  desc:{ en:'The digital input assigned to the shunt thermal switch OK is asserted LOW.', pt:'A entrada digital atribuída à chave térmica do shunt está em nível baixo.' },
  action:{ en:'Check digital input wiring and assignments. Check shunt power configuration. Reduce regenerative energy dissipation. Add external shunt resistor or active brake module.', pt:'Verificar fiação e atribuições da entrada digital. Verificar configuração de shunt. Reduzir dissipação de energia regenerativa. Adicionar resistor de shunt externo.' }},

{ code:'FLT S29', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Regulator Thermal Overload Factory Limit Fault', pt:'Falha de Sobrecarga Térmica do Regulador de Barramento (Limite de Fábrica)' },
  desc:{ en:'The shunt thermal model has exceeded its factory set thermal capacity limit.', pt:'O modelo térmico do shunt excedeu o limite de capacidade térmica de fábrica.' },
  action:{ en:'Modify the duty cycle. Add external shunt for additional capacity. Add capacitor module.', pt:'Modificar o ciclo de trabalho. Adicionar shunt externo. Adicionar módulo capacitor.' }},

{ code:'FLT S30', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Regulator Thermal Overload User Limit Fault', pt:'Falha de Sobrecarga Térmica do Regulador de Barramento (Limite do Usuário)' },
  desc:{ en:'The shunt thermal model has exceeded the thermal capacity limit given by Bus Regulator Thermal Overload User Limit.', pt:'O modelo térmico do shunt excedeu o limite definido pelo usuário.' },
  action:{ en:'Modify duty cycle. Add external shunt. Increase Bus Regulator Thermal Overload UL attribute value.', pt:'Modificar ciclo de trabalho. Adicionar shunt externo. Aumentar o atributo Bus Regulator Thermal Overload UL.' }},

{ code:'FLT S31', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Regulator Failure', pt:'Falha do Regulador de Barramento' },
  desc:{ en:'The shunt circuit has detected that the shunt resistor is shorted.', pt:'O circuito de shunt detectou que o resistor de shunt está em curto-circuito.' },
  action:{ en:'Check for shorts in the shunt connector. Unplug and measure resistance of the shunt. Replace power supply if shunt resistor is shorted.', pt:'Verificar curto no conector do shunt. Medir a resistência do shunt. Substituir a fonte se o resistor estiver em curto.' }},

{ code:'FLT S32', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Module Failure', pt:'Falha do Módulo de Barramento' },
  desc:{ en:'The digital input assigned to capacitor/bus conditioner module OK is asserted LOW. Sub-codes: 01=Capacitor module, 02=DC-bus conditioner module.', pt:'A entrada digital atribuída ao módulo capacitor/condicionador está em nível baixo. Sub-códigos: 01=Módulo capacitor, 02=Módulo condicionador de barramento CC.' },
  action:{ en:'Check the digital input wiring and assignments. Replace the accessory module, if necessary.', pt:'Verificar fiação e atribuições da entrada digital. Substituir o módulo acessório se necessário.' }},

{ code:'FLT S33', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Undervoltage Factory Limit Fault', pt:'Falha de Subtensão do Barramento (Limite de Fábrica)' },
  desc:{ en:'DC Bus voltage level is below the factory set limit.', pt:'O nível de tensão do barramento CC está abaixo do limite de fábrica.' },
  action:{ en:'Verify voltage level of the incoming AC. Monitor AC power source for glitches or line droop. Install UPS on AC input.', pt:'Verificar tensão de entrada CA. Monitorar a fonte CA para oscilações. Instalar UPS na entrada CA.' }},

{ code:'FLT S34', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Undervoltage User Limit Fault', pt:'Falha de Subtensão do Barramento (Limite do Usuário)' },
  desc:{ en:'DC-bus voltage level is below the user set limit given by Bus Undervoltage User Limit.', pt:'O nível de tensão do barramento CC está abaixo do limite definido pelo usuário.' },
  action:{ en:'Verify incoming AC voltage. Monitor AC source for glitches. Install UPS. Increase Bus Undervoltage UL attribute value.', pt:'Verificar tensão de entrada CA. Monitorar fonte CA. Instalar UPS. Aumentar o atributo Bus Undervoltage UL.' }},

{ code:'FLT S35', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Overvoltage Factory Limit Fault', pt:'Falha de Sobretensão do Barramento (Limite de Fábrica)' },
  desc:{ en:'DC-bus voltage level is above the factory set limit. Sub-code 01: Excessive Regen. Long DC bus cables can amplify voltage overshoots.', pt:'O nível de tensão do barramento CC está acima do limite de fábrica. Sub-código 01: Regeneração excessiva. Cabos longos de barramento CC podem amplificar sobretensões.' },
  action:{ en:'Change deceleration or motion profile. Unplug shunt and measure resistance. Add external shunt resistor or active brake module. Replace DC-bus power supply if shunt resistor is open.', pt:'Alterar perfil de desaceleração ou movimento. Medir resistência do shunt. Adicionar resistor de shunt externo ou módulo de frenagem ativa. Substituir fonte CC se o shunt estiver aberto.' }},

{ code:'FLT S37', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Power Loss Fault', pt:'Falha de Perda de Energia do Barramento' },
  desc:{ en:'The DC-bus voltage level is below the bus power loss threshold for more than 50 ms.', pt:'O nível de tensão do barramento CC está abaixo do limite de perda de energia por mais de 50 ms.' },
  action:{ en:'Verify voltage level of the incoming AC. Increase the Power Loss Threshold Attribute. Monitor AC power source for glitches. Install UPS on AC input.', pt:'Verificar tensão de entrada CA. Aumentar o atributo Power Loss Threshold. Monitorar fonte CA. Instalar UPS.' }},

{ code:'FLT S38', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Power Fuse Blown Fault', pt:'Falha de Fusível de Potência do Barramento' },
  desc:{ en:'The internal DC-bus power fuse is blown. Sub-code 00: Non user-replaceable fuse. Sub-code 01: User replaceable fuse (iTRAK power supply only).', pt:'O fusível interno do barramento CC queimou. Sub-código 00: Fusível não substituível pelo usuário. Sub-código 01: Fusível substituível pelo usuário (somente iTRAK).' },
  action:{ en:'Sub-code 00: Return drive for repair. Sub-code 01: Verify output power wiring, replace fuse.', pt:'Sub-código 00: Retornar o drive para reparo. Sub-código 01: Verificar fiação de saída, substituir fusível.' }},

{ code:'FLT S40', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Power Sharing Fault', pt:'Falha de Compartilhamento de Energia do Barramento' },
  desc:{ en:'A power supply sharing DC-bus power with this module has requested that this module stop consuming power from the DC-bus.', pt:'Uma fonte de alimentação que compartilha o barramento CC com este módulo solicitou que este pare de consumir energia.' },
  action:{ en:'Check the fault condition on the DC-bus power supply. Install UPS on AC input.', pt:'Verificar a condição de falha na fonte do barramento CC. Instalar UPS na entrada CA.' }},

{ code:'FLT S41', device:'k5700', cat:'FLT-S',
  name:{ en:'Feedback Signal Noise Fault', pt:'Falha de Ruído no Sinal de Feedback' },
  desc:{ en:'The number of illegal state transitions of the motor AQB encoder feedback signals has exceeded a factory limit.', pt:'O número de transições de estado ilegais dos sinais de feedback do encoder AQB excedeu o limite de fábrica.' },
  action:{ en:'Verify motor feedback wiring is not open/shorted/missing. Use shielded cables away from noise. Check system grounds, replace motor/encoder.', pt:'Verificar fiação do feedback do motor. Usar cabos blindados. Verificar aterramento, substituir motor/encoder.' }},

{ code:'FLT S43', device:'k5700', cat:'FLT-S',
  name:{ en:'Feedback Signal Loss Factory Limit Fault', pt:'Falha de Perda do Sinal de Feedback (Limite de Fábrica)' },
  desc:{ en:'The detected voltage levels of the A/B channel signals from the feedback device are below the Feedback Signal Loss factory limit.', pt:'Os níveis de tensão detectados nos canais A/B do dispositivo de feedback estão abaixo do limite de fábrica.' },
  action:{ en:'Verify motor feedback wiring is not open/shorted/missing. Use shielded cables, route away from noise. Check system grounds, replace motor/encoder.', pt:'Verificar fiação de feedback do motor. Usar cabos blindados. Verificar aterramento, substituir motor/encoder.' }},

{ code:'FLT S44', device:'k5700', cat:'FLT-S',
  name:{ en:'Feedback Signal Loss User Limit Fault', pt:'Falha de Perda do Sinal de Feedback (Limite do Usuário)' },
  desc:{ en:'The detected voltage levels of the A/B channel signals from the feedback device are below the user limit.', pt:'Os níveis de tensão dos canais A/B do dispositivo de feedback estão abaixo do limite do usuário.' },
  action:{ en:'Verify motor feedback wiring is not open/shorted/missing. Use shielded cables, route away from noise. Check system grounds, replace motor/encoder.', pt:'Verificar fiação de feedback do motor. Usar cabos blindados. Verificar aterramento, substituir motor/encoder.' }},

{ code:'FLT S45', device:'k5700', cat:'FLT-S',
  name:{ en:'Motor Feedback Data Loss Factory Limit Fault', pt:'Falha de Perda de Dados de Feedback do Motor (Limite de Fábrica)' },
  desc:{ en:'The number of consecutive missed or corrupted serial data packets from the intelligent feedback device has exceeded a factory set limit.', pt:'O número de pacotes de dados seriais consecutivos perdidos ou corrompidos do dispositivo de feedback excedeu o limite de fábrica.' },
  action:{ en:'Check motor feedback cable and connector. Check motor power cable and feedback wire shields. Check motor frame is grounded. Consult solutions for FLT S47.', pt:'Verificar cabo e conector do feedback do motor. Verificar blindagens dos cabos. Verificar aterramento do motor. Consultar soluções para FLT S47.' }},

{ code:'FLT S47 (DSL nn=01–37)', device:'k5700', cat:'FLT-S',
  name:{ en:'Motor Feedback Device Failure Fault (DSL)', pt:'Falha do Dispositivo de Feedback do Motor (DSL nn=01–37)' },
  desc:{ en:'The DSL feedback device detected an internal error. Sub-codes: 01=Acceleration Overflow, 04=Tracking Filter Error, 05=Vector Length Error, 06=Counter Error, 07=Sync Error, 16=Single Turn Error, 17=Multi Turn Amplitude Error, 18=Multi Turn Sync Error, 19=Multi Turn Vector Length Error, 35=Standard Parameter Error, 36/37=Internal Communication Error.', pt:'O dispositivo de feedback DSL detectou um erro interno. Sub-códigos: 01=Overflow de aceleração, 04=Erro de filtro de rastreamento, 05=Erro de comprimento de vetor, 06=Erro de contador, 07=Erro de sincronização, 16/17/18/19=Erros de multi-volta, 35/36/37=Erros de parâmetro e comunicação.' },
  action:{ en:'Check motor feedback cable connectivity. Check motor phasing (U,V,W) and DSL feedback 2-pin connections. Review electrical noise reduction in user manual. Cycle control power. Reduce shock and vibration to motor. Replace motor if fault continues.', pt:'Verificar conectividade do cabo de feedback. Verificar faseamento do motor (U,V,W) e conexões DSL de 2 pinos. Revisar redução de ruído elétrico no manual. Ciclar alimentação de controle. Substituir motor se persistir.' }},

{ code:'FLT S47 (DSL nn=38–88)', device:'k5700', cat:'FLT-S',
  name:{ en:'Motor Feedback Device Failure Fault (DSL)', pt:'Falha do Dispositivo de Feedback do Motor (DSL nn=38–88)' },
  desc:{ en:'The DSL feedback device detected an internal error. Sub-codes: 38=Internal System Error, 48=Critical Temperature, 49=Critical LED Current, 50=Critical Supply Voltage, 51=Critical Speed, 52=Critical Acceleration, 53=Counter Overflow, 54=Internal Monitoring Error, 66=Internal Resource Access Error, 88=Position Out of Range (requires control power cycle).', pt:'O dispositivo DSL detectou erro interno. Sub-códigos: 38=Erro de sistema, 48=Temperatura crítica, 49=Corrente LED crítica, 50=Tensão de alimentação crítica, 51=Velocidade crítica, 52=Aceleração crítica, 53=Overflow de contador, 54=Erro de monitoramento, 66=Erro de acesso a recurso, 88=Posição fora do alcance (requer ciclo de alimentação).' },
  action:{ en:'Check motor feedback cable. Check motor phasing and DSL connections. Cycle control power. Check feedback shield. Reduce shock and vibration. Replace motor if fault continues.', pt:'Verificar cabo de feedback. Verificar faseamento e conexões DSL. Ciclar alimentação de controle. Verificar blindagem. Substituir motor se persistir.' }},

{ code:'FLT S47 (Hiperface nn=01–35)', device:'k5700', cat:'FLT-S',
  name:{ en:'Motor Feedback Device Failure Fault (Hiperface)', pt:'Falha do Dispositivo de Feedback do Motor (Hiperface)' },
  desc:{ en:'The Hiperface feedback device detected an internal error. Sub-codes include: 01=Incorrect Alignment Data, 06=Internal Checksum Error, 07=Encoder Reset, 08=Counter Overflow, 09=Parity Error, 28=Analog Signal Monitoring, 29=Transmitter Current Critical, 30=Encoder Temperature Critical, 31=Speed Too High, 32=SingleTurn Position Unreliable, 33-35=MultiTurn Position Error.', pt:'O dispositivo Hiperface detectou erro interno. Sub-códigos incluem: 01=Dados de alinhamento incorretos, 06=Erro de checksum, 07=Reset do encoder, 09=Erro de paridade, 28=Monitoramento de sinais analógicos, 29=Corrente do transmissor crítica, 30=Temperatura crítica, 31=Velocidade muito alta, 32=Posição single-turn não confiável, 33-35=Erros de multi-volta.' },
  action:{ en:'Check motor feedback cable. Check motor phasing and Hiperface 15-pin connections. Review electrical noise reduction. Cycle control power. Check feedback shield. Replace motor if fault continues.', pt:'Verificar cabo de feedback. Verificar faseamento e conexões Hiperface de 15 pinos. Revisar redução de ruído. Ciclar alimentação. Substituir motor se persistir.' }},

{ code:'FLT S49', device:'k5700', cat:'FLT-S',
  name:{ en:'Brake Slip Exception', pt:'Exceção de Deslizamento do Freio' },
  desc:{ en:'Motor displacement exceeded the brake slip tolerance while the mechanical brake was engaged.', pt:'O deslocamento do motor excedeu a tolerância de deslizamento do freio enquanto o freio mecânico estava acionado.' },
  action:{ en:'Check motor brake.', pt:'Verificar o freio do motor.' }},

{ code:'FLT S50', device:'k5700', cat:'FLT-S',
  name:{ en:'Hardware Overtravel — Positive', pt:'Overtravel de Hardware — Direção Positiva' },
  desc:{ en:'The axis has moved beyond the digital input travel limit in the positive direction.', pt:'O eixo se moveu além do limite de curso da entrada digital na direção positiva.' },
  action:{ en:'Check digital input and axis position.', pt:'Verificar a entrada digital e a posição do eixo.' }},

{ code:'FLT S51', device:'k5700', cat:'FLT-S',
  name:{ en:'Hardware Overtravel — Negative', pt:'Overtravel de Hardware — Direção Negativa' },
  desc:{ en:'The axis has moved beyond the digital input travel limit in the negative direction.', pt:'O eixo se moveu além do limite de curso da entrada digital na direção negativa.' },
  action:{ en:'Check digital input and axis position.', pt:'Verificar a entrada digital e a posição do eixo.' }},

{ code:'FLT S54', device:'k5700', cat:'FLT-S',
  name:{ en:'Excessive Position Error Fault', pt:'Falha de Erro de Posição Excessivo' },
  desc:{ en:'The position error of the position control loop has exceeded Position Error Tolerance for a time period given by Position Error Tolerance Time.', pt:'O erro de posição do loop de controle excedeu a Tolerância de Erro de Posição pelo tempo definido por Position Error Tolerance Time.' },
  action:{ en:'Check position loop tuning. Increase feedforward gain. Verify drive and motor sizing. Check motor power wiring. Increase Position Error Tolerance and/or Tolerance Time attribute values.', pt:'Verificar sintonia do loop de posição. Aumentar ganho de feedforward. Verificar dimensionamento. Verificar fiação de potência. Aumentar os atributos de tolerância de erro de posição.' }},

{ code:'FLT S55', device:'k5700', cat:'FLT-S',
  name:{ en:'Excessive Velocity Error Fault', pt:'Falha de Erro de Velocidade Excessivo' },
  desc:{ en:'The velocity error of the velocity control loop has exceeded Velocity Error Tolerance for a time period given by Velocity Error Tolerance Time.', pt:'O erro de velocidade do loop de controle excedeu a Tolerância de Erro de Velocidade pelo tempo definido por Velocity Error Tolerance Time.' },
  action:{ en:'Check velocity loop tuning. Reduce acceleration. Verify drive and motor sizing. Check motor power wiring. Increase Velocity Error Tolerance and/or Tolerance Time attribute values.', pt:'Verificar sintonia do loop de velocidade. Reduzir aceleração. Verificar dimensionamento. Verificar fiação de potência. Aumentar os atributos de tolerância de erro de velocidade.' }},

{ code:'FLT S56', device:'k5700', cat:'FLT-S',
  name:{ en:'Overtorque Limit Fault', pt:'Falha de Limite de Sobretorque' },
  desc:{ en:'Motor torque has risen above the user-defined maximum torque level given by Overtorque Limit for a time period given by Overtorque Limit Time.', pt:'O torque do motor excedeu o limite máximo definido pelo usuário pelo período de tempo definido.' },
  action:{ en:'Verify Torque Trim value. Verify motion profile. Verify drive and motor sizing. Increase Overtorque Limit and/or Overtorque Limit Time attribute values.', pt:'Verificar o valor do Torque Trim. Verificar perfil de movimento. Verificar dimensionamento. Aumentar atributos de Overtorque Limit.' }},

{ code:'FLT S57', device:'k5700', cat:'FLT-S',
  name:{ en:'Undertorque Limit Fault', pt:'Falha de Limite de Subtorque' },
  desc:{ en:'Motor torque has dropped below the user-defined minimum torque level given by Undertorque Limit for a time period given by Undertorque Limit Time.', pt:'O torque do motor caiu abaixo do limite mínimo definido pelo usuário pelo período de tempo definido.' },
  action:{ en:'Verify motion profile. Verify drive and motor sizing. Decrease Undertorque Limit and/or Undertorque Limit Time attribute values.', pt:'Verificar perfil de movimento. Verificar dimensionamento. Diminuir atributos de Undertorque Limit.' }},

{ code:'FLT S58', device:'k5700', cat:'FLT-S',
  name:{ en:'Excessive Bus Voltage Error', pt:'Erro de Tensão de Barramento Excessivo' },
  desc:{ en:'The bus voltage error has exceeded the Bus Voltage Error Tolerance for the time period given by Bus Voltage Error Tolerance Time. Sub-codes for iTRAK: 01=Mid Bus, 02=Full Bus.', pt:'O erro de tensão do barramento excedeu a Tolerância de Erro de Tensão pelo período definido. Sub-códigos iTRAK: 01=Mid Bus, 02=Full Bus.' },
  action:{ en:'Check voltage loop tuning. Verify sizing of power system components. Increase Bus Voltage Error Tolerance and/or Tolerance Time. Verify DC-bus cable is within length specification.', pt:'Verificar sintonia do loop de tensão. Verificar dimensionamento dos componentes. Aumentar tolerância de erro de tensão. Verificar comprimento do cabo do barramento CC.' }},

{ code:'FLT S61', device:'k5700', cat:'FLT-S',
  name:{ en:'Enable Input Deactivated', pt:'Entrada de Habilitação Desativada' },
  desc:{ en:'The hardware enable input was deactivated while the drive was enabled.', pt:'A entrada de habilitação de hardware foi desativada enquanto o drive estava habilitado.' },
  action:{ en:'Check drive enable input wiring. Un-assign Enable as a digital input source.', pt:'Verificar fiação da entrada de habilitação do drive. Remover a atribuição de Enable como fonte de entrada digital.' }},

{ code:'FLT S64', device:'k5700', cat:'FLT-S',
  name:{ en:'AC Line Overvoltage Factory Limit Fault', pt:'Falha de Sobretensão da Linha CA (Limite de Fábrica)' },
  desc:{ en:'The AC Line voltage has exceeded the factory set voltage limit.', pt:'A tensão da linha CA excedeu o limite de tensão de fábrica.' },
  action:{ en:'Verify voltage level of the incoming AC input voltage. Reduce the peak of the AC input voltage. Check the AC power source for distortion.', pt:'Verificar nível de tensão da entrada CA. Reduzir o pico da tensão de entrada. Verificar distorção na fonte de alimentação CA.' }},

{ code:'FLT S66', device:'k5700', cat:'FLT-S',
  name:{ en:'AC Line Undervoltage Factory Limit Fault', pt:'Falha de Subtensão da Linha CA (Limite de Fábrica)' },
  desc:{ en:'The AC Line voltage has dropped below the factory set voltage limit.', pt:'A tensão da linha CA caiu abaixo do limite de tensão de fábrica.' },
  action:{ en:'Verify voltage level of the incoming AC input voltage. Check the AC power source for distortion.', pt:'Verificar nível de tensão da entrada CA. Verificar distorção na fonte de alimentação CA.' }},

{ code:'FLT S68', device:'k5700', cat:'FLT-S',
  name:{ en:'AC Line High Frequency Factory Limit Fault', pt:'Falha de Alta Frequência da Linha CA (Limite de Fábrica)' },
  desc:{ en:'The AC Line frequency has exceeded the factory set high frequency limit.', pt:'A frequência da linha CA excedeu o limite de alta frequência de fábrica.' },
  action:{ en:'Verify the frequency of the incoming AC line.', pt:'Verificar a frequência da linha CA de entrada.' }},

{ code:'FLT S70', device:'k5700', cat:'FLT-S',
  name:{ en:'AC Line Low Frequency Factory Limit Fault', pt:'Falha de Baixa Frequência da Linha CA (Limite de Fábrica)' },
  desc:{ en:'The AC Line frequency has dropped below the factory set low frequency limit.', pt:'A frequência da linha CA caiu abaixo do limite de baixa frequência de fábrica.' },
  action:{ en:'Verify the frequency of the incoming AC line.', pt:'Verificar a frequência da linha CA de entrada.' }},

{ code:'FLT S72', device:'k5700', cat:'FLT-S',
  name:{ en:'AC Line Voltage Unbalance', pt:'Desequilíbrio de Tensão da Linha CA' },
  desc:{ en:'The AC Line Voltage Unbalance has exceeded the configured AC Line Voltage Unbalanced Limit.', pt:'O desequilíbrio de tensão da linha CA excedeu o limite configurado.' },
  action:{ en:'Monitor the AC Line voltages for unbalance. Increase the AC Line Voltage Unbalance Limit.', pt:'Monitorar as tensões da linha CA para desequilíbrio. Aumentar o Limite de Desequilíbrio de Tensão.' }},

{ code:'FLT S73', device:'k5700', cat:'FLT-S',
  name:{ en:'AC Line Current Unbalance', pt:'Desequilíbrio de Corrente da Linha CA' },
  desc:{ en:'The AC Line Current Unbalance has exceeded the configured AC Line Current Unbalanced Limit.', pt:'O desequilíbrio de corrente da linha CA excedeu o limite configurado.' },
  action:{ en:'Monitor the AC Line currents for unbalance. Increase the AC Line Current Unbalance Limit.', pt:'Monitorar as correntes da linha CA para desequilíbrio. Aumentar o Limite de Desequilíbrio de Corrente.' }},

{ code:'FLT S74', device:'k5700', cat:'FLT-S',
  name:{ en:'AC Line Voltage Sag', pt:'Afundamento de Tensão da Linha CA' },
  desc:{ en:'The AC Line Voltage has dropped below the AC Line Voltage Sag Threshold for more than the timeout period specified by AC Line Voltage Sag Time value.', pt:'A tensão da linha CA caiu abaixo do limiar de afundamento por mais tempo que o especificado.' },
  action:{ en:'Monitor AC Line voltages for sags. Reduce AC Line Voltage Sag Threshold attribute value. Increase AC Line Voltage Sag Time attribute value.', pt:'Monitorar tensões da linha CA. Reduzir o atributo de limiar de afundamento. Aumentar o atributo de tempo de afundamento.' }},

{ code:'FLT S75', device:'k5700', cat:'FLT-S',
  name:{ en:'AC Line Frequency Change', pt:'Mudança de Frequência da Linha CA' },
  desc:{ en:'The AC Line Frequency rate of change has exceeded the AC Line Frequency Change Threshold for more than the timeout period specified by AC Line Frequency Change Time.', pt:'A taxa de variação de frequência da linha CA excedeu o limiar pelo período especificado.' },
  action:{ en:'Monitor the AC Line frequency. Increase AC Line Frequency Change Threshold value. Increase AC Line Frequency Change Time value.', pt:'Monitorar a frequência da linha CA. Aumentar o valor do limiar de mudança de frequência. Aumentar o valor do tempo de mudança.' }},

{ code:'FLT S76', device:'k5700', cat:'FLT-S',
  name:{ en:'AC Line Synchronization Loss/Failure', pt:'Perda/Falha de Sincronização da Linha CA' },
  desc:{ en:'Loss: The converter lost synchronization to the AC Line for more than the timeout specified by AC Line Sync Loss Time. Failure: The converter was not able to achieve AC Line frequency synchronization.', pt:'Perda: O conversor perdeu sincronização com a linha CA por mais do que o tempo de timeout. Falha: O conversor não conseguiu atingir sincronização de frequência com a linha CA.' },
  action:{ en:'Monitor AC Line power source for distortion. Check wiring. Increase AC Line Sync Loss Time. If failure: run as a passive power supply (no Regen capabilities).', pt:'Monitorar a fonte CA para distorção. Verificar fiação. Aumentar o tempo de Sync Loss. Em caso de falha: operar como fonte passiva (sem regeneração).' }},

{ code:'FLT S80', device:'k5700', cat:'FLT-S',
  name:{ en:'Inverter Ground Current Factory Limit', pt:'Falha de Corrente de Terra do Inversor (Limite de Fábrica)' },
  desc:{ en:'The inverter power stage has detected ground current exceeding the factory set limit.', pt:'O estágio de potência do inversor detectou corrente de terra excedendo o limite de fábrica.' },
  action:{ en:'Check motor power wiring. Check power cable for shorts. Replace motor if the fault persists.', pt:'Verificar fiação de potência do motor. Verificar curto no cabo. Substituir motor se persistir.' }},

{ code:'FLT S81', device:'k5700', cat:'FLT-S',
  name:{ en:'Inverter Ground Current User Limit', pt:'Falha de Corrente de Terra do Inversor (Limite do Usuário)' },
  desc:{ en:'The inverter power stage has detected ground current exceeding the user set limit.', pt:'O estágio de potência do inversor detectou corrente de terra excedendo o limite do usuário.' },
  action:{ en:'Check motor power wiring. Check power cable for shorts. Replace motor if the fault persists. Check User Limit.', pt:'Verificar fiação de potência do motor. Verificar curto no cabo. Substituir motor se persistir. Verificar limite do usuário.' }},

{ code:'FLT S89', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Input Overcurrent Factory Limit (DSx)', pt:'Sobrecorrente de Entrada do Barramento — Limite de Fábrica (DSx)' },
  desc:{ en:'The DC Bus input current to the device has exceeded the factory set limit. (DSx modules only)', pt:'A corrente de entrada do barramento CC excedeu o limite de fábrica. (Somente módulos DSx)' },
  action:{ en:'Check power cable for shorts. Reduce load on DC bus. Operate within continuous power rating. Reduce acceleration times.', pt:'Verificar curto no cabo. Reduzir carga no barramento CC. Operar dentro da capacidade contínua. Reduzir tempos de aceleração.' }},

{ code:'FLT S90', device:'k5700', cat:'FLT-S',
  name:{ en:'Bus Input Overcurrent User Limit (DSx)', pt:'Sobrecorrente de Entrada do Barramento — Limite do Usuário (DSx)' },
  desc:{ en:'The DC Bus input current to the device has exceeded the user set limit. (DSx modules only)', pt:'A corrente de entrada do barramento CC excedeu o limite do usuário. (Somente módulos DSx)' },
  action:{ en:'Check power cable for shorts. Reduce load on DC bus. Operate within continuous power rating. Reduce acceleration times. Check user limit.', pt:'Verificar curto no cabo. Reduzir carga no barramento CC. Operar dentro da capacidade contínua. Reduzir tempos de aceleração. Verificar limite do usuário.' }},

// FLT Mxx ────────────────────────────────────────────────────
{ code:'FLT M01', device:'k5700', cat:'FLT-M',
  name:{ en:'Commutation Start Up Failure', pt:'Falha de Inicialização de Comutação' },
  desc:{ en:'The self-sensing commutation startup algorithm failed.', pt:'O algoritmo de inicialização de comutação auto-sensível falhou.' },
  action:{ en:'Modify self-sense attributes. Use shielded cables. Slow down the profile. Check system grounds. Reduce load inertia and/or friction. Use different commutation startup method. Check for mechanical obstruction.', pt:'Modificar atributos de auto-sensoriamento. Usar cabos blindados. Reduzir velocidade do perfil. Verificar aterramento. Reduzir inércia e atrito. Usar método diferente de inicialização. Verificar obstrução mecânica.' }},

{ code:'FLT M02', device:'k5700', cat:'FLT-M',
  name:{ en:'Motor Voltage Mismatch Fault', pt:'Falha de Incompatibilidade de Tensão do Motor' },
  desc:{ en:'The configured voltage of the drive is greater than the motor rated voltage. For example, a 400V-class drive with a 200V-class motor.', pt:'A tensão configurada do drive é maior que a tensão nominal do motor. Por exemplo, drive de 400V com motor de 200V.' },
  action:{ en:'Set the drive voltage to a lower value or replace motor with voltage rating that matches the drive.', pt:'Ajustar a tensão do drive para um valor menor ou substituir o motor por um de tensão compatível.' }},

{ code:'FLT M05', device:'k5700', cat:'FLT-M',
  name:{ en:'Feedback Battery Loss', pt:'Perda de Bateria do Feedback' },
  desc:{ en:'The battery charge level is too low and encoder power has been removed resulting in loss of absolute position.', pt:'O nível de carga da bateria está muito baixo e a alimentação do encoder foi removida, resultando em perda de posição absoluta.' },
  action:{ en:'Replace the battery and clear the fault.', pt:'Substituir a bateria e limpar a falha.' }},

{ code:'FLT M06', device:'k5700', cat:'FLT-M',
  name:{ en:'Feedback Battery Low', pt:'Bateria do Feedback Baixa' },
  desc:{ en:'The battery charge level is too low. If encoder power is lost, absolute feedback position will be lost.', pt:'O nível de carga da bateria está baixo. Se a alimentação do encoder for perdida, a posição absoluta será perdida.' },
  action:{ en:'Replace the battery and clear the fault if necessary.', pt:'Substituir a bateria e limpar a falha se necessário.' }},

{ code:'FLT M07', device:'k5700', cat:'FLT-M',
  name:{ en:'Feedback Incremental Count Error Fault', pt:'Falha de Erro de Contagem Incremental do Feedback' },
  desc:{ en:'The periodic check of the incremental encoder position against the absolute encoder position or Hall edges indicates they are out of tolerance.', pt:'A verificação periódica da posição do encoder incremental em relação à posição absoluta indica que estão fora de tolerância.' },
  action:{ en:'Verify motor feedback wiring is correct and not open/shorted/missing. Use shielded cables. Route feedback away from noise sources. Check system grounds, replace motor/encoder.', pt:'Verificar que a fiação do feedback do motor está correta. Usar cabos blindados. Verificar aterramento, substituir motor/encoder.' }},

{ code:'FLT M12', device:'k5700', cat:'FLT-M',
  name:{ en:'Converter Precharge Overload Factory Limit Fault', pt:'Falha de Sobrecarga de Pré-carga do Conversor (Limite de Fábrica)' },
  desc:{ en:'The thermal model for the precharge resistor detected that precharge capacity exceeded the factory limit due to excessive AC power cycling.', pt:'O modelo térmico do resistor de pré-carga detectou que a capacidade de pré-carga excedeu o limite de fábrica devido ao ciclismo excessivo da alimentação CA.' },
  action:{ en:'Reduce the amount of modules in the same bus group. Reduce the frequency of AC power cycling. Remove capacitor modules.', pt:'Reduzir a quantidade de módulos no mesmo grupo de barramento. Reduzir a frequência de ciclismo da alimentação CA. Remover módulos capacitores.' }},

{ code:'FLT M26', device:'k5700', cat:'FLT-M',
  name:{ en:'Runtime Error', pt:'Erro de Runtime' },
  desc:{ en:'The drive firmware encountered an unrecoverable runtime error.', pt:'O firmware do drive encontrou um erro de runtime irrecuperável.' },
  action:{ en:'Cycle control power. Check feedback device integrity. Reset the drive module. Return module for repair if fault continues.', pt:'Ciclar a alimentação de controle. Verificar integridade do dispositivo de feedback. Resetar o módulo. Retornar para reparo se persistir.' }},

{ code:'FLT M28', device:'k5700', cat:'FLT-M',
  name:{ en:'Safety Module Communication Error', pt:'Erro de Comunicação do Módulo de Segurança' },
  desc:{ en:'Communication with the safety hardware within the drive has failed.', pt:'A comunicação com o hardware de segurança interno ao drive falhou.' },
  action:{ en:'Cycle control power. Reset the drive. Return drive for repair if fault continues.', pt:'Ciclar a alimentação de controle. Resetar o drive. Retornar para reparo se persistir.' }},

{ code:'FLT M29', device:'k5700', cat:'FLT-M',
  name:{ en:'AC Line Contactor Fault', pt:'Falha do Contator da Linha CA' },
  desc:{ en:'AC Line Contactor is missing or incorrectly wired. Sub-codes: 01=Not Present, 02=Wiring Error.', pt:'O contator da linha CA está ausente ou com fiação incorreta. Sub-códigos: 01=Não presente, 02=Erro de fiação.' },
  action:{ en:'Connect the AC Line Contactor. Check the wiring.', pt:'Conectar o contator da linha CA. Verificar a fiação.' }},

{ code:'FLT M30', device:'k5700', cat:'FLT-M',
  name:{ en:'AC Line Resonance Factory Limit Fault', pt:'Falha de Ressonância da Linha CA (Limite de Fábrica)' },
  desc:{ en:'The converter has detected AC line resonance current that has exceeded the factory set limit given by AC Line Resonance Factory Limit.', pt:'O conversor detectou corrente de ressonância da linha CA que excedeu o limite de fábrica.' },
  action:{ en:'Monitor AC Line power source for disturbances or distortion. Check wiring. Ensure converter is configured and tuned according to the Kinetix 5700 user manual.', pt:'Monitorar a fonte CA para perturbações ou distorções. Verificar fiação. Garantir que o conversor esteja configurado conforme o manual do Kinetix 5700.' }},

// INIT FLT ───────────────────────────────────────────────────
{ code:'INIT FLT M01', device:'k5700', cat:'INIT',
  name:{ en:'Smart Encoder Data Corruption', pt:'Corrupção de Dados do Encoder Inteligente' },
  desc:{ en:'The data stored in the encoder has a checksum error.', pt:'Os dados armazenados no encoder têm um erro de checksum.' },
  action:{ en:'Cycle control power. Return motor for repair if fault continues.', pt:'Ciclar a alimentação de controle. Retornar o motor para reparo se persistir.' }},

{ code:'INIT FLT M02', device:'k5700', cat:'INIT',
  name:{ en:'Motor Data Range Error', pt:'Erro de Faixa dos Dados do Motor' },
  desc:{ en:'A motor data attribute stored in the encoder is out of range. Sub-codes: 01=Rev, 02=Cont Current, 03=Peak Current, 04=Rated Power, 05=Overload Limit, 06=Thermal Capacitance, 07=Thermal Resistance, 08=Motor Resistance, 09=Motor Inductance, 10=Inertia, 11=Rated Speed, 12=Max Speed, 13=Rated Torque, 14=Torque Const, 15=Back EMF Const, 16=Pole Pitch.', pt:'Um atributo de dados do motor armazenado no encoder está fora do intervalo. Sub-códigos correspondem a parâmetros como: Rev, Corrente Contínua/Pico, Potência Nominal, Limite de Sobrecarga, Capacitância/Resistência Térmica, Resistência/Indutância do Motor, Inércia, Velocidades, Torques, Constantes e Passo de Polo.' },
  action:{ en:'Cycle control power. Return motor for repair if fault continues.', pt:'Ciclar a alimentação de controle. Retornar o motor para reparo se persistir.' }},

{ code:'INIT FLT M03', device:'k5700', cat:'INIT',
  name:{ en:'Motor Feedback Communication Startup Fault', pt:'Falha de Inicialização de Comunicação do Feedback do Motor' },
  desc:{ en:'Communication with the encoder could not be established.', pt:'Não foi possível estabelecer comunicação com o encoder.' },
  action:{ en:'Cycle control power. Check motor feedback connector. Check motor power and feedback shield terminations on the drive. Return motor for repair if fault continues.', pt:'Ciclar a alimentação de controle. Verificar conector do feedback do motor. Verificar terminações de blindagem. Retornar motor para reparo se persistir.' }},

{ code:'INIT FLT M06', device:'k5700', cat:'INIT',
  name:{ en:'Feedback Absolute Startup Speed Fault', pt:'Falha de Velocidade de Inicialização Absoluta do Feedback' },
  desc:{ en:'The absolute encoder was not able to accurately determine the position after power-up due to speed greater than 100 rpm.', pt:'O encoder absoluto não conseguiu determinar a posição com precisão após energização devido a velocidade superior a 100 rpm.' },
  action:{ en:'Make sure the motor shaft is not moving during power-up.', pt:'Garantir que o eixo do motor não esteja em movimento durante a energização.' }},

{ code:'INIT FLT M14', device:'k5700', cat:'INIT',
  name:{ en:'Invalid Safety Firmware', pt:'Firmware de Segurança Inválido' },
  desc:{ en:'The loaded Safety firmware is not compatible with the drive firmware.', pt:'O firmware de segurança carregado não é compatível com o firmware do drive.' },
  action:{ en:'Cycle control power. Update the drive firmware. Return drive for repair if fault continues.', pt:'Ciclar a alimentação de controle. Atualizar o firmware do drive. Retornar para reparo se persistir.' }},

{ code:'INIT FLT M20', device:'k5700', cat:'INIT',
  name:{ en:'Unknown Module Fault', pt:'Falha de Módulo Desconhecido' },
  desc:{ en:'The product code of the power board is invalid.', pt:'O código de produto da placa de potência é inválido.' },
  action:{ en:'Cycle control power. Reset the drive. Return drive for repair if fault continues.', pt:'Ciclar a alimentação de controle. Resetar o drive. Retornar para reparo se persistir.' }},

{ code:'INIT FLT M21', device:'k5700', cat:'INIT',
  name:{ en:'Factory Configuration Error', pt:'Erro de Configuração de Fábrica' },
  desc:{ en:'Factory configuration data is missing or invalid.', pt:'Os dados de configuração de fábrica estão ausentes ou são inválidos.' },
  action:{ en:'Cycle control power. Reset the drive. Return drive for repair if fault continues.', pt:'Ciclar a alimentação de controle. Resetar o drive. Retornar para reparo se persistir.' }},

// INHIBIT ────────────────────────────────────────────────────
{ code:'INHIBIT S01', device:'k5700', cat:'INHIBIT',
  name:{ en:'Axis Enable Input Start Inhibit', pt:'Inibição de Início — Entrada de Habilitação do Eixo' },
  desc:{ en:'When Enable Input Checking is enabled, the drive shows this inhibit when the enable input is inactive while the axis is in Starting/Running/Testing/Hold sub-state of Stopped state.', pt:'Quando a verificação de entrada de habilitação está ativa, o drive exibe esta inibição quando a entrada de habilitação está inativa no sub-estado Stopped.' },
  action:{ en:'Confirm the digital input assigned to Enable is active. Check module enable input wiring. Check digital input assignments.', pt:'Confirmar que a entrada digital atribuída ao Enable está ativa. Verificar fiação da entrada de habilitação. Verificar atribuições de entrada digital.' }},

{ code:'INHIBIT S02', device:'k5700', cat:'INHIBIT',
  name:{ en:'Motor Not Configured', pt:'Motor Não Configurado' },
  desc:{ en:'The associated motor has not been properly configured for use.', pt:'O motor associado não foi configurado corretamente para uso.' },
  action:{ en:'Verify motor configuration in the Logix Designer application.', pt:'Verificar a configuração do motor no Logix Designer.' }},

{ code:'INHIBIT S03', device:'k5700', cat:'INHIBIT',
  name:{ en:'Feedback Not Configured', pt:'Feedback Não Configurado' },
  desc:{ en:'The feedback has not been properly configured for use.', pt:'O feedback não foi configurado corretamente para uso.' },
  action:{ en:'Verify feedback configuration in the Logix Designer application.', pt:'Verificar a configuração do feedback no Logix Designer.' }},

{ code:'INHIBIT S04', device:'k5700', cat:'INHIBIT',
  name:{ en:'Commutation Not Configured — Standard Start Inhibit', pt:'Comutação Não Configurada — Inibição de Início Padrão' },
  desc:{ en:'Associated permanent magnet motor commutation has not been configured for use.', pt:'A comutação do motor de imã permanente associado não foi configurada para uso.' },
  action:{ en:'Verify that the proper motor feedback commutation alignment has been selected.', pt:'Verificar que o alinhamento de comutação do feedback do motor adequado foi selecionado.' }},

{ code:'INHIBIT S05', device:'k5700', cat:'INHIBIT',
  name:{ en:'Safe Torque Off Active', pt:'Safe Torque Off Ativo' },
  desc:{ en:'The integrated Safe Torque Off safety function is active.', pt:'A função de segurança Safe Torque Off integrada está ativa.' },
  action:{ en:'Verify the safety controller is configured properly. Verify communication between safety controller and drive. Verify STO output from safety controller is active. Clear safety fault condition if required.', pt:'Verificar que o controlador de segurança está configurado corretamente. Verificar comunicação. Verificar saída STO do controlador. Limpar condição de falha de segurança se necessário.' }},

{ code:'INHIBIT S06', device:'k5700', cat:'INHIBIT',
  name:{ en:'Converter Bus Unload', pt:'Descarregamento do Barramento do Conversor' },
  desc:{ en:'The converter supplying power to this drive axis has requested that it not draw power from the DC Bus.', pt:'O conversor que fornece energia para este eixo solicitou que não seja consumida energia do barramento CC.' },
  action:{ en:'Check the status of the converter supplying DC bus power to this axis.', pt:'Verificar o status do conversor que fornece energia do barramento CC para este eixo.' }},

{ code:'INHIBIT M02', device:'k5700', cat:'INHIBIT',
  name:{ en:'Motor Feedback Required', pt:'Feedback do Motor Necessário' },
  desc:{ en:'Selected Motor Control mode cannot run without a valid feedback selection.', pt:'O modo de controle do motor selecionado não pode funcionar sem uma seleção de feedback válida.' },
  action:{ en:'Verify that the proper motor feedback type has been selected.', pt:'Verificar que o tipo de feedback do motor adequado foi selecionado.' }},

{ code:'INHIBIT M04', device:'k5700', cat:'INHIBIT',
  name:{ en:'Torque Prove Configuration — Start Inhibit', pt:'Configuração de Torque Prove — Inibição de Início' },
  desc:{ en:'When Torque Proving configuration is enabled, control mode, feedback mode, motor feedback type, and motor option configuration must be set properly.', pt:'Quando o Torque Proving está habilitado, o modo de controle, modo de feedback, tipo de feedback do motor e configuração de opção do motor devem estar definidos corretamente.' },
  action:{ en:'Verify that the proper axis configuration has been selected. Verify that sufficient torque prove current has been configured.', pt:'Verificar que a configuração correta do eixo foi selecionada. Verificar que a corrente de torque prove configurada é suficiente.' }},

{ code:'INHIBIT M05', device:'k5700', cat:'INHIBIT',
  name:{ en:'Start Inhibit — Safe Torque Off', pt:'Inibição de Início — Safe Torque Off' },
  desc:{ en:'The safety function has disabled the power structure.', pt:'A função de segurança desabilitou o estágio de potência.' },
  action:{ en:'Check safety input wiring. Check state of safety devices.', pt:'Verificar fiação das entradas de segurança. Verificar estado dos dispositivos de segurança.' }},

// NODE FLT ───────────────────────────────────────────────────
{ code:'NODE FLT 01', device:'k5700', cat:'NODE-FLT',
  name:{ en:'Control Connection Update Fault', pt:'Falha de Atualização da Conexão de Controle' },
  desc:{ en:'Several consecutive updates from the controller have been lost.', pt:'Várias atualizações consecutivas do controlador foram perdidas.' },
  action:{ en:'Remove unnecessary network devices from the motion network. Change network topology so fewer devices share common paths. Use high performance network equipment. Use shielded cables. Separate signal wiring from power wiring.', pt:'Remover dispositivos desnecessários da rede de movimento. Alterar topologia de rede. Usar equipamento de rede de alto desempenho. Usar cabos blindados. Separar fiação de sinal da fiação de potência.' }},

{ code:'NODE FLT 02', device:'k5700', cat:'NODE-FLT',
  name:{ en:'Processor Watchdog Fault', pt:'Falha de Watchdog do Processador' },
  desc:{ en:'The processor on the power board or control board failed to update in the required time.', pt:'O processador na placa de potência ou de controle não atualizou dentro do tempo exigido.' },
  action:{ en:'Cycle control power. Return drive for repair if fault continues.', pt:'Ciclar a alimentação de controle. Retornar o drive para reparo se persistir.' }},

{ code:'NODE FLT 03 (PwrIF)', device:'k5700', cat:'NODE-FLT',
  name:{ en:'Hardware Fault — PwrIF', pt:'Falha de Hardware — PwrIF' },
  desc:{ en:'Communication with the power board could not be established.', pt:'Não foi possível estabelecer comunicação com a placa de potência.' },
  action:{ en:'Cycle control power. Update the drive firmware. Return drive for repair if fault continues.', pt:'Ciclar a alimentação de controle. Atualizar o firmware do drive. Retornar para reparo se persistir.' }},

{ code:'NODE FLT 03 (DSL)', device:'k5700', cat:'NODE-FLT',
  name:{ en:'Hardware Fault — DSL', pt:'Falha de Hardware — DSL' },
  desc:{ en:'Communication with the DSL encoder could not be established.', pt:'Não foi possível estabelecer comunicação com o encoder DSL.' },
  action:{ en:'Check DSL feedback wiring (check against wiring diagram). Verify DSL cable is not shorted or open. Replace Kinetix VP motor feedback device if defective. Cycle power.', pt:'Verificar fiação do feedback DSL (comparar com diagrama de fiação). Verificar se o cabo DSL está em curto ou aberto. Substituir dispositivo de feedback do motor Kinetix VP se defeituoso. Ciclar alimentação.' }},

{ code:'NODE FLT 03 (Board)', device:'k5700', cat:'NODE-FLT',
  name:{ en:'Hardware Fault — Board Compatibility', pt:'Falha de Hardware — Compatibilidade de Placa' },
  desc:{ en:'The control and power boards are incompatible.', pt:'As placas de controle e potência são incompatíveis.' },
  action:{ en:'Return drive for repair if fault continues.', pt:'Retornar o drive para reparo se persistir.' }},

{ code:'NODE FLT 04', device:'k5700', cat:'NODE-FLT',
  name:{ en:'Data Format Fault', pt:'Falha de Formato de Dados' },
  desc:{ en:'An error has occurred in the data format between the controller and the device.', pt:'Ocorreu um erro no formato de dados entre o controlador e o dispositivo.' },
  action:{ en:'Cycle control power. Check controller and Ethernet switch operation.', pt:'Ciclar a alimentação de controle. Verificar operação do controlador e do switch Ethernet.' }},

{ code:'NODE FLT 05', device:'k5700', cat:'NODE-FLT',
  name:{ en:'Clock Skew Fault', pt:'Falha de Desvio de Clock' },
  desc:{ en:'The controller time and the drive\'s system time are not the same.', pt:'O tempo do controlador e o tempo do sistema do drive não são os mesmos.' },
  action:{ en:'Cycle control power. Check controller and Ethernet switch operation.', pt:'Ciclar a alimentação de controle. Verificar operação do controlador e do switch Ethernet.' }},

{ code:'NODE FLT 06', device:'k5700', cat:'NODE-FLT',
  name:{ en:'Lost Controller Connection Fault', pt:'Falha de Perda de Conexão com o Controlador' },
  desc:{ en:'Communication with the controller has been lost.', pt:'A comunicação com o controlador foi perdida.' },
  action:{ en:'Check Ethernet connection. Check controller and Ethernet switch operation.', pt:'Verificar a conexão Ethernet. Verificar operação do controlador e do switch Ethernet.' }},

{ code:'NODE FLT 07', device:'k5700', cat:'NODE-FLT',
  name:{ en:'Clock Sync Fault', pt:'Falha de Sincronização de Clock' },
  desc:{ en:'Drive\'s local clock has lost synchronization with controller\'s clock and was not able to resynchronize within allotted time.', pt:'O clock local do drive perdeu sincronização com o clock do controlador e não conseguiu ressincronizar no tempo permitido.' },
  action:{ en:'Check Ethernet connection. Check controller and Ethernet switch operation.', pt:'Verificar a conexão Ethernet. Verificar operação do controlador e do switch Ethernet.' }},

{ code:'NODE FLT 09', device:'k5700', cat:'NODE-FLT',
  name:{ en:'Duplicate IP Address Fault', pt:'Falha de Endereço IP Duplicado' },
  desc:{ en:'Several consecutive updates from the controller have been lost due to duplicate IP address.', pt:'Várias atualizações consecutivas do controlador foram perdidas devido a endereço IP duplicado.' },
  action:{ en:'Select an IP address not already in use on the network.', pt:'Selecionar um endereço IP que não esteja em uso na rede.' }},

// NODE ALARM ─────────────────────────────────────────────────
{ code:'NODE ALARM 01', device:'k5700', cat:'NODE-ALM',
  name:{ en:'Control Connection Update Alarm', pt:'Alarme de Atualização da Conexão de Controle' },
  desc:{ en:'Updates from the controller have been late.', pt:'As atualizações do controlador estão chegando com atraso.' },
  action:{ en:'Remove unnecessary network devices from motion network. Change network topology. Use high performance network equipment. Use shielded cables. Separate signal wiring from power wiring.', pt:'Remover dispositivos desnecessários da rede de movimento. Alterar topologia de rede. Usar equipamento de alto desempenho. Usar cabos blindados. Separar fiação de sinal da fiação de potência.' }},

{ code:'NODE ALARM 03', device:'k5700', cat:'NODE-ALM',
  name:{ en:'Clock Jitter Alarm', pt:'Alarme de Jitter de Clock' },
  desc:{ en:'The sync variance has exceeded the sync threshold while the device is running in sync mode.', pt:'A variância de sincronização excedeu o limiar de sincronização enquanto o dispositivo opera em modo síncrono.' },
  action:{ en:'Route the network cable away from potential noise sources. Reduce the number of devices on the EtherNet/IP network. Use a managed switch which supports CIP Sync (PTP time synchronization) and configure clock mode correctly.', pt:'Rotear o cabo de rede longe de fontes de ruído. Reduzir o número de dispositivos na rede EtherNet/IP. Usar switch gerenciado com suporte a CIP Sync (PTP) e configurar o modo de clock corretamente.' }},

{ code:'NODE ALARM 04', device:'k5700', cat:'NODE-ALM',
  name:{ en:'Clock Skew Alarm', pt:'Alarme de Desvio de Clock' },
  desc:{ en:'The controller time and the drive\'s time are not the same.', pt:'O tempo do controlador e o tempo do drive não são os mesmos.' },
  action:{ en:'Check the Ethernet connection. Check controller and Ethernet switch operation.', pt:'Verificar a conexão Ethernet. Verificar operação do controlador e do switch Ethernet.' }},

{ code:'NODE ALARM 05', device:'k5700', cat:'NODE-ALM',
  name:{ en:'Clock Sync Alarm', pt:'Alarme de Sincronização de Clock' },
  desc:{ en:'Drive\'s local clock has lost synchronization with controller\'s clock for a short time during synchronous operation.', pt:'O clock local do drive perdeu sincronização com o clock do controlador por um curto período durante operação síncrona.' },
  action:{ en:'Check the Ethernet connection. Check controller and Ethernet switch operation.', pt:'Verificar a conexão Ethernet. Verificar operação do controlador e do switch Ethernet.' }},

// SAFE FLT (Hardwired STO) ───────────────────────────────────
{ code:'SAFE FLT 01', device:'k5700', cat:'SAFE',
  name:{ en:'Guard Internal Fault', pt:'Falha Interna de Segurança' },

  action:{ en:'Cycle control power. Return drive for repair if fault continues.', pt:'Ciclar a alimentação de controle. Retornar o drive para reparo se persistir.' }},

{ code:'SAFE FLT 03', device:'k5700', cat:'SAFE',
  name:{ en:'Guard Gate Drive Fault', pt:'Falha de Gate Drive de Segurança' },
  desc:{ en:'Drive safety diagnostic detected internal STO design failure.', pt:'O diagnóstico de segurança do drive detectou falha interna no projeto STO.' },
  action:{ en:'Cycle control power. Execute STO function. Return drive for repair if fault continues.', pt:'Ciclar a alimentação de controle. Executar a função STO. Retornar o drive para reparo se persistir.' }},

{ code:'SAFE FLT 09', device:'k5700', cat:'SAFE',
  name:{ en:'Guard Stop Input Fault', pt:'Falha de Entrada de Parada de Segurança' },
  desc:{ en:'Safe torque-off function mismatch. System does not allow motion. Mismatch detected when safety inputs are in different states for more than 1.0 second or re-trigger quicker than 1.0 second.', pt:'Divergência na função Safe Torque-Off. O sistema não permite movimento. Divergência detectada quando as entradas de segurança estão em estados diferentes por mais de 1,0 segundo.' },

// SAFE FLT (Integrated STO Sxx) ──────────────────────────────
{ code:'SAFE FLT S01', device:'k5700', cat:'SAFE',
  name:{ en:'Safety Core Internal Fault', pt:'Falha Interna do Núcleo de Segurança' },
  desc:{ en:'Drive safety diagnostic detected internal STO design failure.', pt:'O diagnóstico de segurança detectou falha interna no projeto STO.' },
  action:{ en:'Cycle control power. Return drive for repair if fault continues.', pt:'Ciclar a alimentação de controle. Retornar para reparo se persistir.' }},

{ code:'SAFE FLT S02', device:'k5700', cat:'SAFE',
  name:{ en:'Safety Feedback Fault', pt:'Falha de Feedback de Segurança' },
  desc:{ en:'Drive safety diagnostic detected a fault with the encoder feedback device used for safety.', pt:'O diagnóstico de segurança detectou falha no dispositivo de feedback do encoder usado para segurança.' },
  action:{ en:'Check feedback device and feedback connection. The Safety Stop Function object instance attribute #22 can provide further details.', pt:'Verificar o dispositivo de feedback e a conexão de feedback. O atributo #22 do objeto Safety Stop Function pode fornecer mais detalhes.' }},

{ code:'SAFE FLT S03', device:'k5700', cat:'SAFE',
  name:{ en:'Safe Torque Off Fault', pt:'Falha de Safe Torque Off' },
  desc:{ en:'Drive safety diagnostic detected internal STO design failure or hardwired input received while in integrated safety mode.', pt:'O diagnóstico de segurança detectou falha interna no STO ou entrada hardwired recebida no modo de segurança integrada.' },
  action:{ en:'Check the cause using a Safe Torque-off faults explicit message. Remove any connection to hardwired safety inputs and reset using STO Fault Reset procedure. Execute STO function. Return drive for repair if fault continues.', pt:'Verificar a causa usando mensagem explícita de falhas STO. Remover conexões às entradas de segurança hardwired e resetar conforme o procedimento STO Fault Reset. Executar a função STO. Retornar para reparo se persistir.' }},

{ code:'SAFE FLT S04', device:'k5700', cat:'SAFE',
  name:{ en:'Safe Stop 1 Fault', pt:'Falha de Safe Stop 1' },
  desc:{ en:'A Safe Stop 1 function detected a fault condition.', pt:'A função Safe Stop 1 detectou uma condição de falha.' },
  action:{ en:'The deceleration rate or time limitations for SS1 may have been exceeded. Check the SS1 instruction in the safety controller. Safety Stop Functions Instance attribute #284 may provide further details.', pt:'A taxa de desaceleração ou os limites de tempo do SS1 podem ter sido excedidos. Verificar a instrução SS1 no controlador de segurança. O atributo #284 pode fornecer mais detalhes.' }},

{ code:'SAFE FLT S05', device:'k5700', cat:'SAFE',
  name:{ en:'Safe Stop 2 Fault', pt:'Falha de Safe Stop 2' },
  desc:{ en:'A Safe Stop 2 function detected a fault condition.', pt:'A função Safe Stop 2 detectou uma condição de falha.' },
  action:{ en:'The deceleration rate or time limitations for SS2 may have been exceeded. Check the SS2 instruction in the safety controller.', pt:'A taxa de desaceleração ou os limites de tempo do SS2 podem ter sido excedidos. Verificar a instrução SS2 no controlador de segurança.' }},

{ code:'SAFE FLT S06', device:'k5700', cat:'SAFE',
  name:{ en:'Safe Operating Stop Fault', pt:'Falha de Safe Operating Stop' },
  desc:{ en:'A Safe Operating Stop function detected a fault condition.', pt:'A função Safe Operating Stop detectou uma condição de falha.' },
  action:{ en:'The speed or position limitations for SOS may have been exceeded. Check the SOS instruction in the safety controller.', pt:'Os limites de velocidade ou posição do SOS podem ter sido excedidos. Verificar a instrução SOS no controlador de segurança.' }},

{ code:'SAFE FLT S07', device:'k5700', cat:'SAFE',
  name:{ en:'Safe Brake Control Fault', pt:'Falha de Controle de Freio Seguro' },
  desc:{ en:'A Safe Brake Control function detected a fault condition.', pt:'A função Safe Brake Control detectou uma condição de falha.' },
  action:{ en:'The brake used for SBC or the brake engage sensor may have failed. Check the SBC instruction in the safety controller.', pt:'O freio usado para SBC ou o sensor de acionamento do freio pode ter falhado. Verificar a instrução SBC no controlador de segurança.' }},

{ code:'SAFE FLT S16', device:'k5700', cat:'SAFE',
  name:{ en:'Safe Speed Monitor Fault', pt:'Falha de Monitoramento de Velocidade Segura' },
  desc:{ en:'A Safe Speed Monitor function detected a fault condition.', pt:'A função Safe Speed Monitor detectou uma condição de falha.' },
  action:{ en:'Check the SSM instruction in the safety controller. It may have an invalid configuration.', pt:'Verificar a instrução SSM no controlador de segurança. Pode haver uma configuração inválida.' }},

{ code:'SAFE FLT S17', device:'k5700', cat:'SAFE',
  name:{ en:'Safe Limited Speed Fault', pt:'Falha de Velocidade Limitada Segura' },
  desc:{ en:'A Safe Limited Speed function detected a fault condition.', pt:'A função Safe Limited Speed detectou uma condição de falha.' },
  action:{ en:'Check the SLS instruction in the safety controller. It may have an invalid configuration.', pt:'Verificar a instrução SLS no controlador de segurança. Pode haver uma configuração inválida.' }},

{ code:'SAFE FLT S19', device:'k5700', cat:'SAFE',
  name:{ en:'Safe Limited Direction Fault', pt:'Falha de Direção Limitada Segura' },
  desc:{ en:'A Safe Limited Direction function detected a fault condition.', pt:'A função Safe Limited Direction detectou uma condição de falha.' },
  action:{ en:'Check the SDI instruction in the safety controller. It may have an invalid configuration.', pt:'Verificar a instrução SDI no controlador de segurança. Pode haver uma configuração inválida.' }},

{ code:'SAFE FLT S20', device:'k5700', cat:'SAFE',
  name:{ en:'Safe CAM Fault', pt:'Falha de Safe CAM' },
  desc:{ en:'A Safe CAM function detected a fault condition.', pt:'A função Safe CAM detectou uma condição de falha.' },
  action:{ en:'Check the SCA instruction in the safety controller. It may have an invalid configuration.', pt:'Verificar a instrução SCA no controlador de segurança. Pode haver uma configuração inválida.' }},

{ code:'SAFE FLT S21', device:'k5700', cat:'SAFE',
  name:{ en:'Safe Limited Position Fault', pt:'Falha de Posição Limitada Segura' },
  desc:{ en:'A Safe Limited Position function detected a fault condition.', pt:'A função Safe Limited Position detectou uma condição de falha.' },
  action:{ en:'Check the SLP instruction in the safety controller. It may have an invalid configuration.', pt:'Verificar a instrução SLP no controlador de segurança. Pode haver uma configuração inválida.' }},

{ code:'SAFE FLT S30', device:'k5700', cat:'SAFE',
  name:{ en:'Safety Validator Fault', pt:'Falha do Validador de Segurança' },
  desc:{ en:'The Safety Validator function detected a fault condition.', pt:'A função Safety Validator detectou uma condição de falha.' },
  action:{ en:'Check for connection loss and data integrity issues — such as cables and ethernet connections.', pt:'Verificar perda de conexão e problemas de integridade de dados — cabos e conexões ethernet.' }},

{ code:'SAFE FLT S31', device:'k5700', cat:'SAFE',
  name:{ en:'Safety UNID Mismatch', pt:'Incompatibilidade de Safety UNID' },
  desc:{ en:'There is a Safety UNID mismatch.', pt:'Há uma incompatibilidade de Safety UNID.' },
  action:{ en:'Safety UNID does not match the IP Address of the drive. Reset ownership and reconfigure safety.', pt:'O Safety UNID não corresponde ao endereço IP do drive. Resetar a propriedade e reconfigurar a segurança.' }},

{ code:'SAFE FLT M01', device:'k5700', cat:'SAFE',
  name:{ en:'Safety Feedback Interface Fault', pt:'Falha de Interface de Feedback de Segurança' },
  desc:{ en:'A Safety Feedback Interface instruction detected a fault condition.', pt:'A instrução Safety Feedback Interface detectou uma condição de falha.' },
  action:{ en:'Check the SFX instruction in the safety controller.', pt:'Verificar a instrução SFX no controlador de segurança.' }},
